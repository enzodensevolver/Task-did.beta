<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body{font-family:Arial;background:#f0f0f0;margin:0;padding:20px;}
h2{text-align:center;}
ul{list-style:none;padding:0;}
li{background:white;padding:10px;margin:5px 0;border-radius:8px;box-shadow:0 3px 6px rgba(0,0,0,.1);}
</style>
</head>

<body>
<h2>👑 Painel Admin</h2>
<ul id="list"></ul>

<script>
auth.onAuthStateChanged(u=>{
  if(!u){location="index.html"; return;}
  db.collection("users").doc(u.uid).get().then(d=>{
    if(d.data().role!=="admin"){
      alert("Acesso negado!");
      location="dashboard.html";
    }
  });

  db.collection("users").onSnapshot(s=>{
    const list = document.getElementById("list");
    list.innerHTML="";
    s.forEach(d=>{
      const u = d.data();
      list.innerHTML+=`<li>${u.name} - XP:${u.xp} - Lv:${u.level} - Role:${u.role}</li>`;
    });
  });
});
</script>
</body>
</html>
