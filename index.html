<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina Gameificada</title>
<style>
html, body {height:100%; margin:0; font-family: Arial; background: linear-gradient(135deg,#a3cef1,#22c55e);}
body {display:flex; justify-content:center; align-items:center; overflow:hidden;}
.fullscreen-card {position:absolute; top:0; left:0; width:100%; height:100%; background:white; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:20px; box-sizing:border-box;}
header {width:100%; display:flex; justify-content:space-between; align-items:center;}
.trophy-path {position:relative; flex:1; width:95%; display:flex; flex-wrap:wrap; gap:20px; align-content:flex-start; padding:10px; overflow-y:auto;}
.trophy-node {width:80px; height:80px; border-radius:50%; background:#ddd; display:flex; justify-content:center; align-items:center; font-size:18px; cursor:pointer; position:relative; transition: background .3s;}
.trophy-node.completed{background:#f59e0b;color:white;}
.trophy-node span {position:absolute; bottom:-18px; font-size:12px; text-align:center; width:100%;}
.progress-bar {width:90%; height:20px; background:#ddd; border-radius:10px; margin:10px;}
.progress-fill {height:100%; width:0%; background:#22c55e; text-align:right; padding-right:5px; color:white; font-weight:bold; border-radius:10px; transition: width .5s;}
#levelDisplay {position:fixed; bottom:10px; right:10px; background:#6366f1; color:white; padding:8px 12px; border-radius:10px; font-weight:bold;}
button {padding:10px; margin:5px; border-radius:8px; border:none; font-weight:bold; cursor:pointer;}
.icon-btn {background:#22c55e; color:white;}
.icon-btn:hover {background:#159e0e;}
table {width:90%; border-collapse:collapse; margin-top:10px;}
th, td {border:1px solid #ccc; padding:5px; text-align:center;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="fullscreen-card" id="loginCard">
<h1>🚀 Minha Rotina</h1>
<p>Login para acessar a trilha de troféus</p>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p id="msg" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div class="fullscreen-card" id="dashboardCard" style="display:none;">
<header>
  <div class="icon-btn" onclick="showTaskSheet()">➕ Criar Missão</div>
  <div class="icon-btn" onclick="showCompleted()">✔️ Missões Concluídas</div>
</header>
<div class="progress-bar"><div class="progress-fill" id="xpBar">0 XP</div></div>
<div class="trophy-path" id="trophyPath"></div>
</div>

<!-- TASK SHEET -->
<div class="fullscreen-card" id="taskSheetCard" style="display:none;">
<header>
  <div class="icon-btn" onclick="backToDashboard()">⬅ Voltar</div>
</header>
<h2>📋 Planilha de Missões</h2>
<table id="taskSheet">
<tr><th>Nome</th><th>XP</th><th>Horário</th><th>Ações</th></tr>
</table>
<h3>Adicionar Missão</h3>
<input id="newTaskName" placeholder="Nome">
<input id="newTaskXP" type="number" placeholder="XP">
<input id="newTaskHour" type="time" placeholder="Horário">
<button id="saveTaskBtn">Salvar Missão</button>
</div>

<!-- COMPLETED -->
<div class="fullscreen-card" id="completedCard" style="display:none;">
<header>
  <div class="icon-btn" onclick="backToDashboard()">⬅ Voltar</div>
</header>
<h2>🎉 Missões Concluídas</h2>
<div id="completedList"></div>
</div>

<div id="levelDisplay">Level 1</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ELEMENTS
const loginCard = document.getElementById("loginCard");
const dashboardCard = document.getElementById("dashboardCard");
const taskSheetCard = document.getElementById("taskSheetCard");
const completedCard = document.getElementById("completedCard");
const msg = document.getElementById("msg");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const xpBar = document.getElementById("xpBar");
const trophyPath = document.getElementById("trophyPath");
const taskSheet = document.getElementById("taskSheet");
const completedList = document.getElementById("completedList");
const levelDisplay = document.getElementById("levelDisplay");

let userId, userData={};

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){ 
    userId = user.uid;
    db.ref('users/'+userId).once('value').then(snap=>{
      userData = snap.val() || {xp:0,level:1,tasks:{},completed:{}};
      if(!snap.exists()) db.ref('users/'+userId).set(userData);
      showDashboard();
      renderTrail();
      renderXP();
    });
  } else { showLogin(); }
});

function login(){
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email||!password){ msg.innerText="Preencha todos os campos!"; return; }
  auth.signInWithEmailAndPassword(email,password)
    .then(cred=>{
      userId = cred.user.uid;
      db.ref('users/'+userId).once('value').then(snap=>{
        userData = snap.val() || {xp:0,level:1,tasks:{},completed:{}};
        showDashboard();
        renderTrail();
        renderXP();
      });
    }).catch(e=>msg.innerText=e.message);
}

function showLogin(){ loginCard.style.display='flex'; dashboardCard.style.display='none'; taskSheetCard.style.display='none'; completedCard.style.display='none'; }
function showDashboard(){ loginCard.style.display='none'; dashboardCard.style.display='flex'; taskSheetCard.style.display='none'; completedCard.style.display='none'; }
function showTaskSheet(){ loginCard.style.display='none'; dashboardCard.style.display='none'; taskSheetCard.style.display='flex'; completedCard.style.display='none'; renderTaskSheet(); }
function showCompleted(){ loginCard.style.display='none'; dashboardCard.style.display='none'; taskSheetCard.style.display='none'; completedCard.style.display='flex'; renderCompleted(); }
function backToDashboard(){ showDashboard(); renderTrail(); renderXP(); }

// TASKS
function renderTaskSheet(){
  taskSheet.innerHTML = '<tr><th>Nome</th><th>XP</th><th>Horário</th><th>Ações</th></tr>';
  Object.keys(userData.tasks).sort((a,b)=>userData.tasks[a].hour.localeCompare(userData.tasks[b].hour))
  .forEach(key=>{
    const t = userData.tasks[key];
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${t.name}</td><td>${t.xp}</td><td>${t.hour}</td><td><button onclick="deleteTask('${key}')">❌</button></td>`;
    taskSheet.appendChild(tr);
  });
}

document.getElementById("saveTaskBtn").onclick = ()=>{
  const name = document.getElementById("newTaskName").value.trim();
  const xp = parseInt(document.getElementById("newTaskXP").value);
  const hour = document.getElementById("newTaskHour").value;
  if(!name||isNaN(xp)||!hour){ alert("Preencha todos os campos"); return; }
  const key='task_'+Date.now();
  if(!userData.tasks) userData.tasks={};
  userData.tasks[key]={name:name,xp:xp,hour:hour,done:false};
  db.ref('users/'+userId+'/tasks/'+key).set(userData.tasks[key]).then(()=>{
    document.getElementById("newTaskName").value='';
    document.getElementById("newTaskXP").value='';
    document.getElementById("newTaskHour").value='';
    renderTaskSheet();
    renderTrail();
  });
};

function deleteTask(key){
  delete userData.tasks[key];
  db.ref('users/'+userId+'/tasks/'+key).remove().then(()=>{
    renderTaskSheet();
    renderTrail();
  });
}

// TRAIL
function renderTrail(){
  trophyPath.innerHTML='';
  const sortedKeys = Object.keys(userData.tasks).sort((a,b)=>userData.tasks[a].hour.localeCompare(userData.tasks[b].hour));
  sortedKeys.forEach(key=>{
    const t=userData.tasks[key];
    const node=document.createElement('div');
    node.className='trophy-node';
    if(t.done) node.classList.add('completed');
    node.innerHTML='🏆<span>'+t.name+'</span>';
    node.onclick=()=>{
      if(!t.done){
        t.done=true;
        userData.xp += t.xp;
        const today = new Date().toLocaleDateString();
        if(!userData.completed[t.name]) userData.completed[t.name]={total:0,dates:[]};
        userData.completed[t.name].total +=1;
        userData.completed[t.name].dates.push(today);
        db.ref('users/'+userId).set(userData).then(()=>{
          renderTrail();
          renderXP();
          renderCompleted();
        });
      }
    };
    trophyPath.appendChild(node);
  });
}

// COMPLETED
function renderCompleted(){
  completedList.innerHTML='';
  Object.keys(userData.completed).forEach(name=>{
    const c=userData.completed[name];
    const totalXP = c.total * (Object.values(userData.tasks).find(t=>t.name===name)?.xp || 0);
    const div = document.createElement('div');
    div.innerHTML=`<b>${name}</b> - XP acumulado: ${totalXP} <br>Feitas em: ${c.dates.join(', ')}`;
    completedList.appendChild(div);
  });
}

// XP & LEVEL
function renderXP(){
  xpBar.style.width = (userData.xp%1000)/10 + '%';
  xpBar.innerText = userData.xp+' XP';
  levelDisplay.innerText = 'Level '+Math.floor(userData.xp/1000 +1);
}

// LOGOUT
function logout(){ auth.signOut().then(showLogin); }

// RESET DAILY
function resetTasks(){
  Object.keys(userData.tasks).forEach(k=>userData.tasks[k].done=false);
  db.ref('users/'+userId+'/tasks').set(userData.tasks).then(()=>renderTrail());
}

function scheduleDailyReset(){
  const now = new Date();
  const millisTillMidnight = new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0,0)-now;
  setTimeout(()=>{
    resetTasks();
    scheduleDailyReset();
  },millisTillMidnight);
}
scheduleDailyReset();
</script>
</body>
</html>
