<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina Gameificada</title>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#6366f1,#22c55e);display:flex;justify-content:center;align-items:center;min-height:100vh;}
.card{background:white;width:100%;max-width:600px;padding:30px;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.25);text-align:center;animation:fadeIn .5s ease;margin:10px;}
@keyframes fadeIn{from{opacity:0; transform:translateY(20px);}to{opacity:1; transform:translateY(0);}}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc;font-size:15px;}
button{cursor:pointer;border:none;font-weight:bold;}
.btn-login{background:#6366f1;color:white;}
.btn-create{background:#22c55e;color:white;}
.btn-logout{background:#ef4444;color:white;}
.task{background:#f0f0f0;margin:5px 0;padding:10px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.badge{display:inline-block;background:#f59e0b;color:white;padding:5px 10px;border-radius:12px;margin:5px 5px 0 0;font-size:12px;animation:pop 0.3s ease;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.progress-bar{width:100%;background:#ddd;border-radius:10px;overflow:hidden;margin:10px 0;height:20px;}
.progress-fill{height:100%;width:0;background:#22c55e;text-align:right;padding-right:5px;color:white;font-weight:bold;border-radius:10px;transition: width 0.5s ease;}
.trophy-path{display:flex;justify-content:space-between;margin:20px 0;}
.trophy-node{width:50px;height:50px;border-radius:50%;background:#ddd;display:flex;justify-content:center;align-items:center;font-size:24px;transition:background 0.5s;}
.trophy-node.completed{background:#f59e0b;color:white;}
#completedTasks{margin-top:20px;text-align:left;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
<h1>🚀 Minha Rotina</h1>
<p>Crie hábitos, ganhe XP e evolua</p>
<select id="roleSelect">
  <option value="child">Criança</option>
  <option value="parent">Pai/Mãe</option>
</select>
<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button class="btn-create" id="registerBtn">Criar conta</button>
<button class="btn-login" id="loginBtn">Entrar</button>
<p id="msg"></p>
</div>

<!-- DASHBOARD CRIANÇA -->
<div class="card" id="dashboardCard" style="display:none;">
<h2>Caminho de Troféus</h2>
<div class="progress-bar"><div class="progress-fill" id="xpBar">0 XP</div></div>
<div class="trophy-path" id="trophyPath"></div>
<h3>Tarefas:</h3>
<div id="tasks"></div>
<h3>Missões Cumpridas:</h3>
<div id="completedTasks"></div>
<button class="btn-logout" id="logoutChildBtn">🚪 Sair</button>
</div>

<!-- PAINEL PAIS -->
<div class="card" id="parentCard" style="display:none;">
<h2>👪 Painel dos Pais</h2>
<h3>Criar tarefa para a criança</h3>
<input id="childEmail" placeholder="Email da criança">
<input id="taskName" placeholder="Nome da tarefa">
<input id="taskXP" type="number" placeholder="XP da tarefa">
<button id="createTaskBtn">➕ Criar tarefa</button>
<h3>Crianças:</h3>
<ul id="childList"></ul>
<button class="btn-logout" id="logoutParentBtn">🚪 Sair</button>
</div>

<!-- Firebase v9+ -->
<script type="module">
// Importando o Firebase Modular
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { getDatabase, ref, set, get, child, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

// Configuração do Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};

// Inicializando Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Elementos
const loginCard = document.getElementById("loginCard");
const dashboardCard = document.getElementById("dashboardCard");
const parentCard = document.getElementById("parentCard");
const msg = document.getElementById("msg");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const roleSelect = document.getElementById("roleSelect");
const tasksDiv = document.getElementById("tasks");
const xpBar = document.getElementById("xpBar");
const trophyPath = document.getElementById("trophyPath");
const completedTasksDiv = document.getElementById("completedTasks");
const childList = document.getElementById("childList");
const registerBtn = document.getElementById("registerBtn");
const loginBtn = document.getElementById("loginBtn");
const logoutChildBtn = document.getElementById("logoutChildBtn");
const logoutParentBtn = document.getElementById("logoutParentBtn");
const createTaskBtn = document.getElementById("createTaskBtn");

let userId, userData;

// ================= AUTH STATE =================
onAuthStateChanged(auth, (user) => {
  if(!user){ showLogin(); return; }
  userId = user.uid;
  get(child(ref(db), 'users/'+userId)).then((snapshot) => {
    if(snapshot.exists()){
      userData = snapshot.val();
      if(userData.role==='child'){ showDashboard(); loadChildDashboard(); }
      else { showParent(); loadParentPanel(); }
    } else {
      const role = roleSelect.value;
      userData = {name:nameInput.value,email:emailInput.value,role:role,xp:0,level:1,tasks:{},badges:[]};
      set(ref(db, 'users/'+userId), userData);
      if(role==='child'){ showDashboard(); loadChildDashboard(); }
      else { showParent(); loadParentPanel(); }
    }
  });
});

// ================= SHOW =================
function showLogin(){ loginCard.style.display='block'; dashboardCard.style.display='none'; parentCard.style.display='none'; }
function showDashboard(){ loginCard.style.display='none'; dashboardCard.style.display='block'; parentCard.style.display='none'; }
function showParent(){ loginCard.style.display='none'; dashboardCard.style.display='none'; parentCard.style.display='block'; }

// ================= REGISTER =================
registerBtn.addEventListener('click', ()=>{
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  const role = roleSelect.value;
  if(!name || !email || !password){ msg.innerText = "Preencha todos os campos!"; return; }
  createUserWithEmailAndPassword(auth, email, password).then((cred)=>{
    userId = cred.user.uid;
    userData = {name,email,role,xp:0,level:1,tasks:{},badges:[]};
    set(ref(db, 'users/'+userId), userData);
    if(role==='child'){ showDashboard(); loadChildDashboard(); }
    else { showParent(); loadParentPanel(); }
  }).catch((e)=>msg.innerText=e.message);
});

// ================= LOGIN =================
loginBtn.addEventListener('click', ()=>{
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email || !password){ msg.innerText="Preencha todos os campos!"; return; }
  signInWithEmailAndPassword(auth, email, password).then((cred)=>{
    userId = cred.user.uid;
    get(child(ref(db), 'users/'+userId)).then((snapshot)=>{
      userData = snapshot.val();
      if(userData.role==='child'){ showDashboard(); loadChildDashboard(); }
      else { showParent(); loadParentPanel(); }
    });
  }).catch((e)=>msg.innerText=e.message);
});

// ================= LOGOUT =================
logoutChildBtn.addEventListener('click', ()=>signOut(auth).then(showLogin));
logoutParentBtn.addEventListener('click', ()=>signOut(auth).then(showLogin));

// ================= DASHBOARD =================
function loadChildDashboard(){
  updateXP();
  renderTasks();
  renderTrophyPath();
}

function updateXP(){
  xpBar.style.width = (userData.xp % 100)+'%';
  xpBar.innerText = userData.xp+' XP';
}

function renderTasks(){
  tasksDiv.innerHTML='';
  completedTasksDiv.innerHTML='';
  for(let key in userData.tasks){
    const t = userData.tasks[key];
    const div = document.createElement('div');
    div.className='task';
    div.innerHTML = `<span>${t.name} (XP:${t.xp})</span>`;
    if(!t.done){
      const btn = document.createElement('button');
      btn.innerText='✅';
      btn.onclick = ()=>completeTask(key);
      div.appendChild(btn);
      tasksDiv.appendChild(div);
    } else {
      completedTasksDiv.innerHTML += `<div>${t.name} ✅</div>`;
    }
  }
}

function completeTask(key){
  userData.tasks[key].done=true;
  userData.xp += userData.tasks[key].xp;
  if(userData.xp >=100){ userData.xp-=100; userData.level++; userData.badges.push('🏆 Novo nível!'); }
  set(ref(db, 'users/'+userId), userData);
  loadChildDashboard();
}

function renderTrophyPath(){
  trophyPath.innerHTML='';
  for(let key in userData.tasks){
    const t=userData.tasks[key];
    const node = document.createElement('div');
    node.className='trophy-node';
    if(t.done) node.classList.add('completed');
    node.innerText='🏆';
    trophyPath.appendChild(node);
  }
}

// ================= PAINEL PAIS =================
function loadParentPanel(){
  childList.innerHTML='';
  get(ref(db, 'users')).then(snapshot=>{
    snapshot.forEach(childSnap=>{
      const u = childSnap.val();
      if(u.role==='child'){
        const li = document.createElement('li');
        li.innerText = u.name+' - XP:'+u.xp;
        childList.appendChild(li);
      }
    });
  });
}

createTaskBtn.addEventListener('click', ()=>{
  const email = document.getElementById('childEmail').value.trim();
  const name = document.getElementById('taskName').value.trim();
  const xp = parseInt(document.getElementById('taskXP').value);
  if(!email || !name || isNaN(xp)){ alert('Preencha todos os campos'); return; }
  const usersRef = query(ref(db,'users'), orderByChild('email'), equalTo(email));
  get(usersRef).then(snapshot=>{
    snapshot.forEach(childSnap=>{
      const u = childSnap.val();
      const key = 'task_'+Date.now();
      u.tasks[key]={name:name,xp:xp,done:false};
      set(ref(db,'users/'+childSnap.key), u);
      alert('Tarefa criada!');
    });
  });
});
</script>
</body>
</html>
