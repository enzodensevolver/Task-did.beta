<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina</title>

<!-- Firebase versão simples -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
  background: #121212;
  color: white;
  text-align: center;
  font-family: Arial;
}
input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h1>tarefas</h1>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar / Criar</button>
</div>

<div id="app" style="display:none;">
  <input id="tarefa">
  <button onclick="adicionar()">Adicionar</button>
  <ul id="lista"></ul>
  <button onclick="logout()">Sair</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;

// LOGIN
function login() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
    .catch(error => {
      console.log("Erro login:", error.message);

      auth.createUserWithEmailAndPassword(email, senha)
        .catch(error => {
          console.log("Erro criar conta:", error.message);
          alert(error.message);
        });
    });
}

// LOGOUT
function logout() {
  auth.signOut();
}

// DETECTAR USUÁRIO
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    
    carregar();
  } else {
    login.style.display = "block";
    app.style.display = "none";
  }
});

// ADICIONAR
function adicionar(tipo = "normal") {
  let texto = document.getElementById("tarefa").value;

  db.collection("tarefas").add({
    uid: user.uid,
    texto: texto,
    tipo: tipo, // 🔥 novo campo
    feito: false,
    data: new Date().toISOString().split("T")[0] // salva o dia
  });

  tarefa.value = "";
}

// CARREGAR
function carregar() {
  db.collection("tarefas")
    .where("uid", "==", user.uid)
    .onSnapshot(snapshot => {

      let hoje = new Date().toISOString().split("T")[0];

      let lista = document.getElementById("lista");
      lista.innerHTML = "";

      snapshot.forEach(doc => {
        let t = doc.data();

        // 🔥 FILTRO INTELIGENTE
        if (t.tipo === "normal" && t.data !== hoje) return;

        let li = document.createElement("li");
        li.style.background = "#F5F5DC";
        li.style.color = "#000";
        li.style.margin = "10px";
        li.style.padding = "10px";
        li.style.borderRadius = "10px";
        li.style.display = "flex";
        li.style.justifyContent = "space-between";
        li.style.alignItems = "center";

        let span = document.createElement("span");
        span.textContent = t.texto;

        // 🔵 se for diária
        if (t.tipo === "diaria") {
          span.textContent += " 🔁";
        }

        let botao = document.createElement("button");
        botao.textContent = "🗑️";

        botao.onclick = () => {
          db.collection("tarefas").doc(doc.id).delete();
        };

        li.appendChild(span);
        li.appendChild(botao);

        lista.appendChild(li);
      });
    });
}
        // TEXTO
        let span = document.createElement("span");
        span.textContent = t.texto;

        // BOTÃO DELETAR 🗑️
        let botao = document.createElement("button");
        botao.textContent = "🗑️";
        botao.style.background = "red";
        botao.style.color = "white";
        botao.style.border = "none";
        botao.style.borderRadius = "8px";
        botao.style.cursor = "pointer";

        botao.onclick = () => {
          db.collection("tarefas").doc(doc.id).delete();
        };

        li.appendChild(span);
        li.appendChild(botao);

        lista.appendChild(li);
      });
    });
}
<button onclick="adicionar('diaria')">➕ Tarefa diária</button>
</script>

</body>
</html>
