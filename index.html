<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
  background: #E6D3A3; /* bege mais escuro */
  color: #000;
  text-align: center;
  font-family: Arial;
  margin: 0;
  height: 100vh;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
}

li {
  list-style: none;
}
</style>
</head>

<body>

<h1>🔥 Minhas Tarefas</h1>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar / Criar</button>
</div>

<div id="app" style="display:none;">
  <input id="tarefa" placeholder="Nova tarefa">
  <br>
  <button onclick="adicionar()">➕ Normal</button>
  <button onclick="adicionar('diaria')">🔁 Diária</button>

  <ul id="lista" style="
    width: 90%;
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
  "></ul>

  <button onclick="logout()">Sair</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;

// LOGIN
function login() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
    .catch(() => {
      auth.createUserWithEmailAndPassword(email, senha);
    });
}

// LOGOUT
function logout() {
  auth.signOut();
}

// DETECTAR USUÁRIO
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    carregar();
  } else {
    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

// ADICIONAR
function adicionar(tipo = "normal") {
  let input = document.getElementById("tarefa");
  let texto = input.value;

  if (texto === "") return;

  db.collection("tarefas").add({
    uid: user.uid,
    texto: texto,
    tipo: tipo,
    feito: false,
    data: new Date().toISOString().split("T")[0]
  });

  input.value = "";
}

// CARREGAR
function carregar() {
  db.collection("tarefas")
    .where("uid", "==", user.uid)
    .onSnapshot(snapshot => {

      let hoje = new Date().toISOString().split("T")[0];
      let lista = document.getElementById("lista");
      lista.innerHTML = "";

      snapshot.forEach(doc => {
        let t = doc.data();

        // remover tarefas antigas normais
        if (t.tipo === "normal" && t.data !== hoje) return;

        let li = document.createElement("li");

        li.style.background = "#FFF8DC"; // bege claro
        li.style.margin = "10px";
        li.style.padding = "12px";
        li.style.borderRadius = "12px";
        li.style.display = "flex";
        li.style.justifyContent = "space-between";
        li.style.alignItems = "center";
        li.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
        li.style.transition = "0.2s";

        li.onmouseover = () => li.style.transform = "scale(1.02)";
        li.onmouseout = () => li.style.transform = "scale(1)";

        let span = document.createElement("span");
        span.textContent = t.texto;

        if (t.tipo === "diaria") {
          span.textContent += " 🔁";
        }

        if (t.feito) {
          span.style.opacity = "0.5";
        }

        let container = document.createElement("div");

        // ✅ concluir
        let btnCheck = document.createElement("button");
        btnCheck.textContent = "✔️";
        btnCheck.onclick = () => {
          db.collection("tarefas").doc(doc.id).update({
            feito: !t.feito
          });
        };

        // 🗑️ deletar
        let btnDelete = document.createElement("button");
        btnDelete.textContent = "🗑️";
        btnDelete.onclick = () => {
          db.collection("tarefas").doc(doc.id).delete();
        };

        container.appendChild(btnCheck);
        container.appendChild(btnDelete);

        li.appendChild(span);
        li.appendChild(container);

        lista.appendChild(li);
      });
    });
}
</script>

</body>
</html>
