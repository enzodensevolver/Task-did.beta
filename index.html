<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina Gameificada</title>
<!-- Firebase 8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#6366f1,#22c55e);min-height:100vh;}
.card{background:white;width:90%;max-width:900px;margin:20px auto;padding:20px;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.25);}
button{cursor:pointer;border:none;font-weight:bold;padding:8px 12px;border-radius:8px;margin:2px;}
.btn-login{background:#6366f1;color:white;}
.btn-create{background:#22c55e;color:white;}
.btn-logout{background:#ef4444;color:white;}
.task{background:#f0f0f0;margin:5px 0;padding:10px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.task button{background:#22c55e;color:white;}
.completed{background:#f59e0b;color:white;}
.progress-bar{width:100%;background:#ddd;border-radius:10px;overflow:hidden;margin:10px 0;height:20px;}
.progress-fill{height:100%;width:0;background:#22c55e;text-align:right;padding-right:5px;color:white;font-weight:bold;border-radius:10px;transition: width 0.5s ease;}
.trophy-path{display:flex;flex-wrap:wrap;margin:20px 0;gap:10px; justify-content: flex-start;}
.trophy-node{width:60px;height:60px;border-radius:50%;background:#ddd;display:flex;justify-content:center;align-items:center;font-size:14px;position:relative; cursor:pointer;}
.trophy-node img{width:100%;height:100%;border-radius:50%;}
.trophy-node.completed{background:#f59e0b;color:white;}
.badge{display:inline-block;background:#f59e0b;color:white;padding:5px 10px;border-radius:12px;margin:5px 5px 0 0;font-size:12px;animation:pop 0.3s ease;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
.table{width:100%;border-collapse:collapse;}
.table th,.table td{border:1px solid #ccc;padding:8px;text-align:center;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
<h1>🚀 Minha Rotina</h1>
<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button class="btn-create" id="registerBtn">Criar conta</button>
<button class="btn-login" id="loginBtn">Entrar</button>
<p id="msg" style="color:red"></p>
</div>

<!-- DASHBOARD / Trilha -->
<div class="card" id="trailCard" style="display:none;">
<h2>Caminho de Troféus 🏆</h2>
<div style="display:flex;justify-content:space-between;">
<button id="addTaskBtn">➕</button>
<div>Level: <span id="level">1</span></div>
<button id="rewardsBtn">🎁</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="xpBar">0 XP</div></div>
<div class="trophy-path" id="trophyPath"></div>
<button class="btn-logout" onclick="logout()">🚪 Sair</button>
</div>

<!-- PAGINA ADICIONAR MISSÕES -->
<div class="card" id="addTaskCard" style="display:none;">
<h2>Adicionar Missões</h2>
<table class="table">
<thead>
<tr><th>Nome</th><th>XP</th><th>Hora</th><th>Ação</th></tr>
</thead>
<tbody id="taskTable"></tbody>
</table>
<button onclick="backToTrail()">⬅ Voltar</button>
</div>

<!-- PAGINA MISSÕES COMPLETADAS -->
<div class="card" id="completedCard" style="display:none;">
<h2>Missões Completadas</h2>
<table class="table" id="completedTable">
<thead><tr><th>Missão</th><th>XP Total</th><th>Concluída em</th><th>Contador</th></tr></thead>
<tbody></tbody>
</table>
<button onclick="backToTrail()">⬅ Voltar</button>
</div>

<!-- PAGINA RECOMPENSAS -->
<div class="card" id="rewardsCard" style="display:none;">
<h2>Recompensas</h2>
<table class="table" id="rewardsTable">
<thead><tr><th>Recompensa</th><th>XP necessário</th><th>Status</th><th>Ação</th></tr></thead>
<tbody></tbody>
</table>
<button onclick="backToTrail()">⬅ Voltar</button>
</div>

<canvas id="confetti"></canvas>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ================= ELEMENTOS =================
const loginCard = document.getElementById("loginCard");
const trailCard = document.getElementById("trailCard");
const addTaskCard = document.getElementById("addTaskCard");
const completedCard = document.getElementById("completedCard");
const rewardsCard = document.getElementById("rewardsCard");
const msg = document.getElementById("msg");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const xpBar = document.getElementById("xpBar");
const levelSpan = document.getElementById("level");
const trophyPath = document.getElementById("trophyPath");

let userId,userData={tasks:{},completed:{},rewards:{}};

// ================= FUNÇÕES =================
function showCard(card){ 
  [loginCard,trailCard,addTaskCard,completedCard,rewardsCard].forEach(c=>c.style.display='none');
  card.style.display='block';
}
function logout(){ auth.signOut().then(()=>showCard(loginCard)); }

// LOGIN
document.getElementById("loginBtn").onclick = ()=>{
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email || !password){ msg.innerText="Preencha todos os campos"; return; }
  auth.signInWithEmailAndPassword(email,password)
    .then(cred=>{
      userId = cred.user.uid;
      db.ref("users/"+userId).once("value").then(snap=>{
        userData = snap.val()||{tasks:{},completed:{},rewards:{}};
        showTrail();
        loadTrail();
      });
    }).catch(err=>msg.innerText=err.message);
};

// REGISTER
document.getElementById("registerBtn").onclick = ()=>{
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!name || !email || !password){ msg.innerText="Preencha todos os campos"; return; }
  auth.createUserWithEmailAndPassword(email,password)
    .then(cred=>{
      userId = cred.user.uid;
      userData = {name,email,xp:0,level:1,tasks:{},completed:{},rewards:{}};
      db.ref("users/"+userId).set(userData).then(()=>{
        showTrail();
        loadTrail();
      });
    }).catch(err=>msg.innerText=err.message);
};

// Função para exibir a trilha e atualizar barra de XP
function showTrail(){
  showCard(trailCard);
}
function loadTrail(){
  // atualizar XP
  const xp = userData.xp||0;
  const level = Math.floor(xp/1000)+1;
  levelSpan.innerText = level;
  xpBar.style.width = Math.min(xp%1000,100)+'%';
  xpBar.innerText = xp+' XP';

  // renderizar tarefas na trilha
  trophyPath.innerHTML='';
  Object.keys(userData.tasks).sort((a,b)=>userData.tasks[a].hour-userData.tasks[b].hour).forEach(key=>{
    const t = userData.tasks[key];
    if(!t.done){
      const node = document.createElement('div');
      node.className='trophy-node';
      node.innerText=t.name;
      node.onclick = ()=>completeTask(key);
      trophyPath.appendChild(node);
    }
  });
}

// Completar missão
function completeTask(key){
  if(!userData.completed[key]) userData.completed[key]={count:0,dates:[]};
  userData.completed[key].count++;
  userData.completed[key].dates.push(new Date().toLocaleString());
  userData.tasks[key].done = true;
  userData.xp = (userData.xp||0)+userData.tasks[key].xp;
  db.ref("users/"+userId).set(userData);
  loadTrail();
  showConfetti();
}

// Confetes
function showConfetti(){
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  for(let i=0;i<100;i++){
    ctx.fillStyle='hsl('+(Math.random()*360)+',100%,50%)';
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,5,0,Math.PI*2);
    ctx.fill();
  }
  setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),1000);
}

// Botões de navegação
document.getElementById("addTaskBtn").onclick = ()=>showCard(addTaskCard);
function backToTrail(){ showCard(trailCard); }

// =================== MAIS FUNÇÕES ===================
// Aqui você adicionaria renderização da planilha, recompensas, missões completadas etc.
</script>
</body>
</html>
