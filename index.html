<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina Gameificada</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:linear-gradient(135deg,#6366f1,#22c55e);min-height:100vh;}
.card{background:white;width:90%;max-width:1000px;margin:20px auto;padding:20px;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.25);}
button{cursor:pointer;border:none;font-weight:bold;padding:6px 10px;border-radius:6px;margin:2px;}
.btn-login{background:#6366f1;color:white;}
.btn-create{background:#22c55e;color:white;}
.btn-logout{background:#ef4444;color:white;}
.trophy-path{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;}
.trophy-node{width:70px;height:70px;border-radius:50%;background:#ddd;display:flex;justify-content:center;align-items:center;font-size:12px;cursor:pointer;position:relative;}
.trophy-node.completed{background:#f59e0b;color:white;}
.progress-bar{width:100%;background:#ddd;border-radius:10px;overflow:hidden;margin:10px 0;height:25px;}
.progress-fill{height:100%;width:0;background:#22c55e;text-align:right;padding-right:5px;color:white;font-weight:bold;border-radius:10px;transition:width 0.5s;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table th,.table td{border:1px solid #ccc;padding:8px;text-align:center;}
#levelDisplay{position:fixed;bottom:10px;right:10px;background:#fff;padding:8px 12px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.2);font-weight:bold;}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
<h1>🚀 Minha Rotina</h1>
<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button class="btn-create" id="registerBtn">Criar conta</button>
<button class="btn-login" id="loginBtn">Entrar</button>
<p id="msg" style="color:red;"></p>
</div>

<!-- TRAIL -->
<div class="card" id="trailCard" style="display:none;">
<h2>Caminho de Troféus 🏞️</h2>
<div style="display:flex;justify-content:space-between;align-items:center;">
<button id="addTaskBtn">➕ Adicionar Missão</button>
<button id="completedBtn">✅ Missões</button>
<button id="rewardsBtn">🎁 Recompensas</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="xpBar">0 XP</div></div>
<div class="trophy-path" id="trophyPath"></div>
<button class="btn-logout" onclick="logout()">🚪 Sair</button>
</div>

<!-- ADD TASKS -->
<div class="card" id="addTaskCard" style="display:none;">
<h2>Adicionar Missões</h2>
<table class="table">
<thead><tr><th>Nome</th><th>XP</th><th>Hora</th><th>Ação</th></tr></thead>
<tbody id="taskTable"></tbody>
</table>
<input id="newTaskName" placeholder="Nome da missão">
<input id="newTaskXP" type="number" placeholder="XP">
<input id="newTaskHour" type="time">
<button id="saveTaskBtn">Salvar Missão</button>
<button onclick="backToTrail()">⬅ Voltar</button>
</div>

<!-- COMPLETED -->
<div class="card" id="completedCard" style="display:none;">
<h2>Missões Completadas</h2>
<table class="table" id="completedTable">
<thead><tr><th>Missão</th><th>XP Total</th><th>Concluída em</th><th>Contador</th></tr></thead>
<tbody></tbody>
</table>
<button onclick="backToTrail()">⬅ Voltar</button>
</div>

<!-- REWARDS -->
<div class="card" id="rewardsCard" style="display:none;">
<h2>Recompensas</h2>
<table class="table" id="rewardsTable">
<thead><tr><th>Recompensa</th><th>XP Necessário</th><th>Status</th><th>Ação</th></tr></thead>
<tbody></tbody>
</table>
<input id="rewardName" placeholder="Nome da Recompensa">
<input id="rewardXP" type="number" placeholder="XP necessário">
<button id="saveRewardBtn">Salvar Recompensa</button>
<button onclick="backToTrail()">⬅ Voltar</button>
</div>

<div id="levelDisplay">Level: 1</div>
<canvas id="confetti"></canvas>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ================= ELEMENTOS =================
const loginCard = document.getElementById("loginCard");
const trailCard = document.getElementById("trailCard");
const addTaskCard = document.getElementById("addTaskCard");
const completedCard = document.getElementById("completedCard");
const rewardsCard = document.getElementById("rewardsCard");
const msg = document.getElementById("msg");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const trophyPath = document.getElementById("trophyPath");
const xpBar = document.getElementById("xpBar");
const levelDisplay = document.getElementById("levelDisplay");
const taskTable = document.getElementById("taskTable");
const completedTable = document.getElementById("completedTable").querySelector('tbody');
const rewardsTable = document.getElementById("rewardsTable").querySelector('tbody');

let userId,userData={tasks:{},completed:{},rewards:{},xp:0};

// ================= FUNÇÕES =================
function showCard(card){ [loginCard,trailCard,addTaskCard,completedCard,rewardsCard].forEach(c=>c.style.display='none'); card.style.display='block'); }
function logout(){ auth.signOut().then(()=>showCard(loginCard)); }
function backToTrail(){ showCard(trailCard); loadTrail(); }

// ================= LOGIN/REGISTER =================
document.getElementById("loginBtn").onclick = ()=>{
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email||!password){ msg.innerText="Preencha todos os campos"; return; }
  auth.signInWithEmailAndPassword(email,password).then(cred=>{
    userId=cred.user.uid;
    db.ref("users/"+userId).once("value").then(snap=>{
      userData = snap.val()||{tasks:{},completed:{},rewards:{},xp:0};
      showCard(trailCard);
      loadTrail();
    });
  }).catch(e=>msg.innerText=e.message);
};

document.getElementById("registerBtn").onclick = ()=>{
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!name||!email||!password){ msg.innerText="Preencha todos os campos"; return; }
  auth.createUserWithEmailAndPassword(email,password).then(cred=>{
    userId=cred.user.uid;
    userData = {name,email,xp:0,tasks:{},completed:{},rewards:{}};
    db.ref("users/"+userId).set(userData).then(()=>{ showCard(trailCard); loadTrail(); });
  }).catch(e=>msg.innerText=e.message);
};

// ================= TRAIL =================
function loadTrail(){
  levelDisplay.innerText = 'Level: '+Math.floor((userData.xp||0)/1000+1);
  xpBar.style.width = Math.min((userData.xp||0)%1000,100)+'%';
  xpBar.innerText = userData.xp+' XP';

  trophyPath.innerHTML='';
  Object.keys(userData.tasks).sort((a,b)=>userData.tasks[a].hour.localeCompare(userData.tasks[b].hour)).forEach(key=>{
    const t = userData.tasks[key];
    if(!t.done){
      const node = document.createElement('div');
      node.className='trophy-node';
      node.innerText=t.name;
      node.onclick = ()=>completeTask(key);
      trophyPath.appendChild(node);
    }
  });
}

// ================= COMPLETE TASK =================
function completeTask(key){
  if(!userData.completed[key]) userData.completed[key]={count:0,dates:[]};
  userData.completed[key].count++;
  userData.completed[key].dates.push(new Date().toLocaleString());
  userData.tasks[key].done=true;
  userData.xp = (userData.xp||0)+userData.tasks[key].xp;
  db.ref('users/'+userId).update({
    tasks: userData.tasks,
    completed: userData.completed,
    xp: userData.xp
  });
  loadTrail();
  showConfetti();
}

// ================= CONFETTI =================
function showConfetti(){
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  for(let i=0;i<100;i++){
    ctx.fillStyle='hsl('+(Math.random()*360)+',100%,50%)';
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,5,0,Math.PI*2);
    ctx.fill();
  }
  setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),1000);
}
</script>
</body>
</html>
