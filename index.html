<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina – Trilha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Arial',sans-serif;
  background:linear-gradient(180deg,#1e88e5,#42a5f5);
  min-height:100vh;
  overflow-x:hidden;
}

/* TELAS */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* LOGIN */
.card{
  background:#fff;
  max-width:420px;
  margin:80px auto;
  padding:25px;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
}
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}
button{border:none;font-weight:bold;cursor:pointer}
.btn-create{background:#43a047;color:white}
.btn-login{background:#1e88e5;color:white}

/* TRILHA */
#trail{
  position:relative;
  width:100%;
  min-height:100vh;
  padding:100px 0 150px;
}
.node{
  width:90px;
  margin:40px auto;
  text-align:center;
}
.node-icon{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#ffca28;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  box-shadow:0 8px 16px rgba(0,0,0,.25);
  cursor:pointer;
}
.node.done .node-icon{
  background:#81c784;
}
.node-name{
  margin-top:8px;
  color:white;
  font-weight:bold;
}

/* ZIG ZAG */
.node:nth-child(even){transform:translateX(120px)}
.node:nth-child(odd){transform:translateX(-120px)}

/* LEVEL */
#levelBox{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#fff;
  padding:10px 16px;
  border-radius:20px;
  font-weight:bold;
  box-shadow:0 8px 16px rgba(0,0,0,.3);
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
#modalContent{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:300px;
  text-align:center;
}
#modalContent button{
  margin-top:15px;
  background:#43a047;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="card">
    <h2>🎮 Minha Rotina</h2>
    <input id="name" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button class="btn-create" onclick="register()">Criar conta</button>
    <button class="btn-login" onclick="login()">Entrar</button>
    <div id="msg"></div>
  </div>
</div>

<!-- TRILHA -->
<div id="trailScreen" class="screen">
  <div id="trail"></div>
  <div id="levelBox">Lv 1</div>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <h3 id="modalTitle"></h3>
    <p id="modalXP"></p>
    <button onclick="confirmTask()">Concluir</button>
  </div>
</div>

<script>
// FIREBASE
const firebaseConfig={
  apiKey:"AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain:"sua-rotina-em-um-site.firebaseapp.com",
  databaseURL:"https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId:"sua-rotina-em-um-site",
  storageBucket:"sua-rotina-em-um-site.appspot.com",
  messagingSenderId:"774359583618",
  appId:"1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

const loginScreen=document.getElementById("loginScreen");
const trailScreen=document.getElementById("trailScreen");
const trail=document.getElementById("trail");
const levelBox=document.getElementById("levelBox");
const modal=document.getElementById("modal");

let userId,userData,selectedTask=null;

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    userId=user.uid;
    db.ref("users/"+userId).once("value").then(s=>{
      userData=s.val();
      showTrail();
      renderTrail();
    });
  }
});

function showTrail(){
  loginScreen.classList.remove("active");
  trailScreen.classList.add("active");
}

// LOGIN
function register(){
  auth.createUserWithEmailAndPassword(
    email.value,password.value
  ).then(c=>{
    return db.ref("users/"+c.user.uid).set({
      name:name.value,
      xp:0,
      level:1,
      tasks:{}
    });
  });
}
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value);
}

// TRILHA
function renderTrail(){
  trail.innerHTML="";
  for(let id in userData.tasks){
    const t=userData.tasks[id];
    if(t.done)continue;

    const node=document.createElement("div");
    node.className="node";
    node.innerHTML=`
      <div class="node-icon">🏆</div>
      <div class="node-name">${t.name}</div>
    `;
    node.onclick=()=>{
      selectedTask=id;
      document.getElementById("modalTitle").innerText=t.name;
      document.getElementById("modalXP").innerText=`+${t.xp} XP`;
      modal.style.display="flex";
    };
    trail.appendChild(node);
  }
  levelBox.innerText="Lv "+userData.level;
}

function confirmTask(){
  const t=userData.tasks[selectedTask];
  t.done=true;
  userData.xp+=t.xp;

  while(userData.xp>=1000){
    userData.xp-=1000;
    userData.level++;
  }
  db.ref("users/"+userId).set(userData);
  modal.style.display="none";
  renderTrail();
}
</script>

</body>
</html>
