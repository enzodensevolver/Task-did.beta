<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rotina Gameificada</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #2196f3, #00bcd4);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: white;
  width: 100%;
  max-width: 420px;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,.25);
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn-create {
  background: #4caf50;
  color: white;
}

.btn-login {
  background: #2196f3;
  color: white;
}

#msg {
  margin-top: 10px;
  color: red;
  text-align: center;
}
</style>
</head>

<body>

<div class="card" id="loginCard">
  <h1>🎮 Minha Rotina</h1>

  <input id="name" placeholder="Nome">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">

  <button class="btn-create" onclick="register()">Criar conta</button>
  <button class="btn-login" onclick="login()">Entrar</button>

  <div id="msg"></div>
</div>

<script>
/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.appspot.com",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* ================= ELEMENTOS ================= */

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msg = document.getElementById("msg");

/* ================= FUNÇÕES ================= */

function register() {
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!name || !email || !password) {
    msg.innerText = "Preencha todos os campos";
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(cred => {
      return db.ref("users/" + cred.user.uid).set({
        name: name,
        email: email,
        xp: 0,
        level: 1,
        createdAt: Date.now()
      });
    })
    .then(() => {
      msg.style.color = "green";
      msg.innerText = "Conta criada com sucesso!";
    })
    .catch(err => {
      msg.innerText = err.message;
    });
}

function login() {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!email || !password) {
    msg.innerText = "Informe email e senha";
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      msg.style.color = "green";
      msg.innerText = "Login realizado!";
      // aqui depois vamos redirecionar para a trilha
    })
    .catch(err => {
      msg.innerText = err.message;
    });
}
</script>

</body>
</html>
