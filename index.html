<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Trilha de Troféus Diária</title>
<style>
body{margin:0;font-family:Arial;background:#ccefc4;overflow:hidden;}
#trailContainer{position:relative;width:100vw;height:100vh;background:url('https://images.unsplash.com/photo-1506765515384-028b60a970df?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;}
.trophy-node{position:absolute;width:60px;height:60px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:24px;color:white;cursor:pointer;transition:0.3s;box-shadow:0 3px 6px rgba(0,0,0,0.3);}
.trophy-node.pending{background:#6366f1;}
.trophy-node.done{background:#f59e0b;}
#completeBtn{position:absolute;display:none;background:#22c55e;color:white;padding:8px 12px;border:none;border-radius:8px;cursor:pointer;}
#completedContainer{position:absolute;top:20px;left:20px;background:white;padding:10px;border-radius:10px;max-height:50vh;overflow-y:auto;opacity:0.9;}
.missionItem{margin-bottom:5px;cursor:pointer;}
.counter{background:#6366f1;color:white;padding:2px 6px;border-radius:8px;margin-left:5px;font-size:12px;}
#addMissionBtn{position:absolute;top:20px;right:20px;font-size:28px;cursor:pointer;}
#backBtn{position:absolute;top:20px;left:20px;font-size:24px;cursor:pointer;cursor:pointer;}
.card{position:absolute;width:90%;max-width:600px;background:white;border-radius:20px;padding:20px;box-shadow:0 15px 35px rgba(0,0,0,0.3);top:50%;left:50%;transform:translate(-50%,-50%);}
input,button{padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc;font-size:16px;}
button{cursor:pointer;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
<h1>🚀 Trilha Diária</h1>
<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button id="registerBtn" style="background:#22c55e;color:white;">Criar conta</button>
<button id="loginBtn" style="background:#6366f1;color:white;">Entrar</button>
<p id="msg" style="color:red;"></p>
</div>

<!-- TRAIL -->
<div id="trailContainer" style="display:none;">
<div id="addMissionBtn">➕</div>
<div id="completedContainer"><h3>Missões Concluídas</h3><div id="completedList"></div></div>
<button id="completeBtn">Concluir</button>
</div>

<!-- ADD MISSION -->
<div class="card" id="addMissionCard" style="display:none;">
<div id="backBtn">⬅ Voltar</div>
<h3>Adicionar Missão</h3>
<table>
<tr><th>Missão</th><th>XP</th><th>Horário</th><th>Ação</th></tr>
<tr>
<td><input id="missionName" placeholder="Nome da missão"></td>
<td><input type="number" id="missionXP" placeholder="XP"></td>
<td><input type="time" id="missionTime"></td>
<td><button id="saveMissionBtn" style="background:#22c55e;color:white;">Salvar</button></td>
</tr>
</table>
</div>

<!-- FIREBASE 8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ELEMENTOS
const loginCard = document.getElementById("loginCard");
const trailContainer = document.getElementById("trailContainer");
const addMissionCard = document.getElementById("addMissionCard");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msg = document.getElementById("msg");

const addMissionBtn = document.getElementById("addMissionBtn");
const backBtn = document.getElementById("backBtn");
const saveMissionBtn = document.getElementById("saveMissionBtn");
const missionName = document.getElementById("missionName");
const missionXP = document.getElementById("missionXP");
const missionTime = document.getElementById("missionTime");

const completeBtn = document.getElementById("completeBtn");
const completedList = document.getElementById("completedList");

let userId, userData;
let selectedTaskKey = null;

// ================= SHOW FUNCTIONS =================
function showLogin(){ loginCard.style.display="block"; trailContainer.style.display="none"; addMissionCard.style.display="none";}
function showTrail(){ loginCard.style.display="none"; trailContainer.style.display="block"; addMissionCard.style.display="none"; renderTrail(); renderCompleted();}
function showAddMission(){ loginCard.style.display="none"; trailContainer.style.display="none"; addMissionCard.style.display="block";}

// ================= AUTH =================
document.getElementById("registerBtn").onclick = ()=>{
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!name||!email||!password){ msg.innerText="Preencha todos os campos!"; return;}
  auth.createUserWithEmailAndPassword(email,password).then(cred=>{
    userId = cred.user.uid;
    userData = {name,email,xp:0,tasks:{}};
    db.ref("users/"+userId).set(userData);
    showTrail();
  }).catch(e=>msg.innerText=e.message);
};

document.getElementById("loginBtn").onclick = ()=>{
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email||!password){ msg.innerText="Preencha todos os campos!"; return;}
  auth.signInWithEmailAndPassword(email,password).then(cred=>{
    userId = cred.user.uid;
    db.ref("users/"+userId).once("value").then(snap=>{
      userData = snap.val();
      // Daily reset at login
      dailyReset();
      showTrail();
    });
  }).catch(e=>msg.innerText=e.message);
};

// ================= ADD MISSION =================
addMissionBtn.onclick = showAddMission;
backBtn.onclick = showTrail;
saveMissionBtn.onclick = ()=>{
  const name = missionName.value.trim();
  const xp = parseInt(missionXP.value);
  const time = missionTime.value;
  if(!name||isNaN(xp)||!time){ alert("Preencha todos os campos"); return;}
  const key = "task_"+Date.now();
  if(!userData.tasks) userData.tasks = {};
  userData.tasks[key] = {name:name,xp:xp,time:time,done:false,history:[]};
  db.ref("users/"+userId).set(userData).then(()=>{
    missionName.value=""; missionXP.value=""; missionTime.value="";
    showTrail();
  });
};

// ================= TRAIL =================
function renderTrail(){
  trailContainer.querySelectorAll(".trophy-node").forEach(n=>n.remove());
  if(!userData.tasks) return;
  const tasksArr = Object.entries(userData.tasks)
    .filter(([k,t])=>!t.done) // only pending
    .sort((a,b)=>a[1].time.localeCompare(b[1].time));
  const width = window.innerWidth-100;
  const height = window.innerHeight-100;
  tasksArr.forEach(([key,t],i)=>{
    const node = document.createElement("div");
    node.className="trophy-node pending";
    node.innerText="🎯";
    node.style.left = (50 + width*(i/tasksArr.length))+"px";
    node.style.top = (50 + (height/2)*(i%2===0?0.3:0.7))+"px";
    node.onclick = ()=>{
      selectedTaskKey = key;
      completeBtn.style.display="block";
      completeBtn.style.left = (parseInt(node.style.left)+70)+"px";
      completeBtn.style.top = node.style.top;
    };
    trailContainer.appendChild(node);
  });
}

// ================= COMPLETE BUTTON =================
completeBtn.onclick = ()=>{
  if(!selectedTaskKey) return;
  const task = userData.tasks[selectedTaskKey];
  const now = Date.now();
  task.done = true; // disappear from trail
  if(!task.history) task.history=[];
  task.history.push(now);
  userData.xp = (userData.xp||0)+task.xp;
  db.ref("users/"+userId).set(userData).then(()=>{
    selectedTaskKey=null;
    completeBtn.style.display="none";
    renderTrail();
    renderCompleted();
  });
};

// ================= COMPLETED MISSIONS =================
function renderCompleted(){
  completedList.innerHTML="";
  if(!userData.tasks) return;
  Object.entries(userData.tasks).forEach(([key,t])=>{
    if(t.history && t.history.length>0){
      const div = document.createElement("div");
      div.className="missionItem";
      div.innerHTML = `${t.name} <span class="counter">x${t.history.length}</span>`;
      div.onclick = ()=>{
        alert(`Missão: ${t.name}\nConcluída ${t.history.length} vezes:\n${t.history.map(ts=>new Date(ts).toLocaleString()).join("\n")}`);
      };
      completedList.appendChild(div);
    }
  });
}

// ================= DAILY RESET =================
function dailyReset(){
  const now = new Date();
  const lastReset = userData.lastReset || 0;
  const today = new Date().setHours(0,0,0,0);
  if(lastReset < today){
    // reset all tasks to done=false
    Object.values(userData.tasks).forEach(t=>t.done=false);
    userData.lastReset = Date.now();
    db.ref("users/"+userId).set(userData);
  }
}

// ================= AUTO RESET AT MIDNIGHT =================
setInterval(()=>{
  const now = new Date();
  if(now.getHours()===0 && now.getMinutes()===0){
    dailyReset();
    renderTrail();
    renderCompleted();
  }
},60000);

</script>
</body>
</html>
