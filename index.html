<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina Gameificada</title>

<!-- Firebase 8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
/* RESET & BASE */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Arial',sans-serif;}
body{background:#1e1e2f;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow-x:hidden;}

/* CARD FULLSCREEN */
.card{background:linear-gradient(135deg,#ffcc00,#ff6b6b);width:100%;max-width:800px;padding:20px;border-radius:20px;box-shadow:0 10px 20px rgba(0,0,0,.5);position:relative;display:flex;flex-direction:column;align-items:center;min-height:90vh;transition:all .5s ease;}
.card h1,h2,h3{margin-bottom:15px;text-align:center;}

/* INPUTS E BOTÕES */
input,select,button{padding:12px;margin:5px 0;border-radius:12px;border:none;font-size:16px;width:100%;max-width:300px;}
button{cursor:pointer;font-weight:bold;transition:transform .2s;}
button:hover{transform:scale(1.05);}
.btn-login{background:#6c5ce7;color:white;}
.btn-create{background:#00b894;color:white;}
.btn-logout{background:#d63031;color:white;}
.icon-btn{width:50px;height:50px;background:#fdcb6e;color:#2d3436;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:24px;margin:5px;cursor:pointer;transition:all .3s;}
.icon-btn:hover{transform:scale(1.2);}

/* TRILHA DE TROFÉUS */
#trophyPath{display:flex;flex-wrap:wrap;justify-content:space-between;width:100%;margin:20px 0;}
.trophy-node{width:60px;height:60px;border-radius:50%;background:#636e72;display:flex;justify-content:center;align-items:center;font-size:24px;margin:10px;transition:all .3s;}
.trophy-node.completed{background:#ffeaa7;color:#2d3436;}
.trophy-node span{display:block;text-align:center;font-size:12px;margin-top:5px;color:#fff;}

/* MISSÕES E RECOMPENSAS */
.task, .reward-item{background:#fd79a8;color:#2d3436;padding:10px 15px;border-radius:15px;margin:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .3s;}
.task.completed{background:#00b894;color:white;}
.reward-item{background:#ffeaa7;color:#2d3436;}
.task button,.reward-item button{background:#00b894;color:white;border-radius:12px;padding:5px 10px;cursor:pointer;transition:all .2s;}
.task button:hover,.reward-item button:hover{transform:scale(1.1);}

/* BARRA DE XP */
.progress-bar{width:90%;background:#b2bec3;border-radius:12px;overflow:hidden;margin:10px 0;height:25px;}
.progress-fill{height:100%;width:0;background:#fdcb6e;text-align:right;padding-right:10px;color:#2d3436;font-weight:bold;transition:width .5s ease;border-radius:12px;}

/* MISSOES COMPLETAS */
#completedTasks{width:90%;margin-top:10px;text-align:left;}

/* LEVEL */
#levelDisplay{position:fixed;bottom:10px;right:10px;background:#6c5ce7;padding:10px 15px;border-radius:20px;font-weight:bold;font-size:16px;z-index:1000;}

/* RESPONSIVO */
@media(max-width:600px){
  .trophy-node{width:50px;height:50px;font-size:18px;}
  .task,.reward-item{font-size:14px;padding:8px;}
  #levelDisplay{font-size:14px;padding:8px 12px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
<h1>🚀 Minha Rotina Gameificada</h1>
<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button class="btn-create" onclick="register()">Criar conta</button>
<button class="btn-login" onclick="login()">Entrar</button>
<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboardCard" style="display:none;">
<header style="width:100%;display:flex;justify-content:space-between;align-items:center;">
<div class="icon-btn" onclick="showTaskSheet()">➕</div>
<div class="icon-btn" onclick="showRewards()">🎁</div>
</header>

<h2>Trilha de Troféus</h2>
<div class="progress-bar"><div class="progress-fill" id="xpBar">0 XP</div></div>
<div id="trophyPath"></div>
<div id="tasks"></div>
<div id="completedTasks"></div>
<button class="btn-logout" onclick="logout()">🚪 Sair</button>
</div>

<!-- PLANILHA DE MISSÕES -->
<div class="card" id="taskSheetCard" style="display:none;">
<header style="width:100%;display:flex;justify-content:flex-start;">
<div class="icon-btn" onclick="backToDashboard()">⬅</div>
</header>
<h2>Adicionar Missões</h2>
<div id="taskSheetList"></div>
</div>

<!-- RECOMPENSAS -->
<div class="card" id="rewardCard" style="display:none;">
<header style="width:100%;display:flex;justify-content:flex-start;">
<div class="icon-btn" onclick="backToDashboard()">⬅</div>
</header>
<h2>🎁 Recompensas</h2>
<div id="rewardList"></div>
</div>

<div id="levelDisplay">Level 1</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ================= ELEMENTOS =================
const loginCard = document.getElementById("loginCard");
const dashboardCard = document.getElementById("dashboardCard");
const taskSheetCard = document.getElementById("taskSheetCard");
const rewardCard = document.getElementById("rewardCard");
const msg = document.getElementById("msg");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const tasksDiv = document.getElementById("tasks");
const trophyPath = document.getElementById("trophyPath");
const completedTasksDiv = document.getElementById("completedTasks");
const taskSheetList = document.getElementById("taskSheetList");
const rewardList = document.getElementById("rewardList");
const xpBar = document.getElementById("xpBar");
const levelDisplay = document.getElementById("levelDisplay");

let userId,userData;

// ================= AUTH =================
auth.onAuthStateChanged(user=>{
  if(!user){ showLogin(); return; }
  userId = user.uid;
  db.ref('users/'+userId).once('value').then(snap=>{
    userData = snap.val();
    if(!userData){
      userData = {name:nameInput.value,email:emailInput.value,tasks:{},completedTasks:{},rewards:{},xp:0,level:1};
      db.ref('users/'+userId).set(userData);
    }
    showDashboard();
    loadDashboard();
  });
});

// ================= SHOW =================
function showLogin(){ loginCard.style.display='flex'; dashboardCard.style.display='none'; taskSheetCard.style.display='none'; rewardCard.style.display='none'; }
function showDashboard(){ loginCard.style.display='none'; dashboardCard.style.display='flex'; taskSheetCard.style.display='none'; rewardCard.style.display='none'; }
function showTaskSheet(){ loginCard.style.display='none'; dashboardCard.style.display='none'; taskSheetCard.style.display='flex'; rewardCard.style.display='none'; renderTaskSheet(); }
function showRewards(){ loginCard.style.display='none'; dashboardCard.style.display='none'; taskSheetCard.style.display='none'; rewardCard.style.display='flex'; renderRewards(); }
function backToDashboard(){ showDashboard(); loadDashboard(); }

// ================= REGISTER/LOGIN =================
function register(){
  const name=nameInput.value.trim(),email=emailInput.value.trim(),password=passwordInput.value;
  if(!name||!email||!password){ msg.innerText='Preencha todos os campos!'; return; }
  auth.createUserWithEmailAndPassword(email,password)
  .then(cred=>{
    userId=cred.user.uid;
    userData={name,email,tasks:{},completedTasks:{},rewards:{},xp:0,level:1};
    db.ref('users/'+userId).set(userData);
    showDashboard();
    loadDashboard();
  }).catch(e=>msg.innerText=e.message);
}

function login(){
  const email=emailInput.value.trim(),password=passwordInput.value;
  if(!email||!password){ msg.innerText='Preencha todos os campos!'; return; }
  auth.signInWithEmailAndPassword(email,password)
  .then(cred=>{
    userId=cred.user.uid;
    db.ref('users/'+userId).once('value').then(snap=>{
      userData=snap.val();
      showDashboard();
      loadDashboard();
    });
  }).catch(e=>msg.innerText=e.message);
}

// ================= DASHBOARD =================
function loadDashboard(){
  renderTasks();
  renderTrophy();
  renderXP();
  renderCompleted();
  renderLevel();
}

// Renderização das tarefas na trilha
function renderTasks(){
  tasksDiv.innerHTML='';
  Object.keys(userData.tasks).sort((a,b)=>userData.tasks[a].time-userData.tasks[b].time).forEach(key=>{
    const t=userData.tasks[key];
    const div=document.createElement('div');
    div.className='task';
    div.innerHTML=`<span>${t.name}</span>`;
    if(!t.done){
      const btn=document.createElement('button');
      btn.innerText='Concluir';
      btn.onclick=()=>completeTask(key);
      div.appendChild(btn);
    } else div.classList.add('completed');
    tasksDiv.appendChild(div);
  });
}

// Tarefas completadas
function renderCompleted(){
  completedTasksDiv.innerHTML='';
  Object.keys(userData.completedTasks).forEach(key=>{
    const c=userData.completedTasks[key];
    completedTasksDiv.innerHTML+=`<div>${c.name} - XP:${c.xp} - ${c.date}</div>`;
  });
}

// Completar tarefa
function completeTask(key){
  const t=userData.tasks[key];
  t.done=true;
  userData.xp+=t.xp;
  if(!userData.completedTasks[key]) userData.completedTasks[key]={name:t.name,xp:t.xp,count:1,date:new Date().toLocaleString()};
  else{userData.completedTasks[key].count+=1;userData.completedTasks[key].xp+=t.xp;userData.completedTasks[key].date=new Date().toLocaleString();}
  db.ref('users/'+userId).set(userData);
  loadDashboard();
}

// Renderizar trilha
function renderTrophy(){
  trophyPath.innerHTML='';
  Object.keys(userData.tasks).sort((a,b)=>userData.tasks[a].time-userData.tasks[b].time).forEach(key=>{
    const t=userData.tasks[key];
    const node=document.createElement('div');
    node.className='trophy-node';
    if(t.done) node.classList.add('completed');
    node.innerHTML='🏆<span>'+t.name+'</span>';
    trophyPath.appendChild(node);
  });
}

// Render XP
function renderXP(){
  const percent=(userData.xp%1000)/1000*100;
  xpBar.style.width=percent+'%';
  xpBar.innerText=userData.xp+' XP';
}

// Render level
function renderLevel(){ levelDisplay.innerText='Level '+userData.level; }

// ================= PLANILHA DE MISSÕES =================
function renderTaskSheet(){
  taskSheetList.innerHTML='';
  Object.keys(userData.tasks).sort((a,b)=>userData.tasks[a].time-userData.tasks[b].time).forEach(key=>{
    const t=userData.tasks[key];
    const div=document.createElement('div');
    div.className='task';
    div.innerHTML=`<span>${t.name} - Horário: ${t.timeStr || ''} - XP:${t.xp}</span>`;
    taskSheetList.appendChild(div);
  });
  // Botão adicionar nova tarefa
  const btn=document.createElement('button');
  btn.innerText='➕ Adicionar Missão';
  btn.onclick=()=>{
    const name=prompt('Nome da missão:');
    const xp=parseInt(prompt('XP da missão:'));
    const timeStr=prompt('Horário (ex: 08:00):');
    const timeParts=timeStr.split(':');
    const time=new Date();time.setHours(parseInt(timeParts[0]),parseInt(timeParts[1]));
    const key='task_'+Date.now();
    userData.tasks[key]={name,xp,time:time.getTime(),timeStr};
    db.ref('users/'+userId+'/tasks/'+key).set(userData.tasks[key]).then(()=>renderTaskSheet());
  };
  taskSheetList.appendChild(btn);
}

// ================= RECOMPENSAS =================
function renderRewards(){
  rewardList.innerHTML='';
  Object.keys(userData.rewards||{}).forEach(key=>{
    const r=userData.rewards[key];
    const div=document.createElement('div');
    div.className='reward-item';
    div.innerHTML=`<span>${r.name} - XP Necessário:${r.xpRequired} - Coletado:${r.collected || 0}</span>`;
    const btn=document.createElement('button');
    btn.innerText='🎁 Coletar';
    btn.onclick=()=>{
      if(userData.xp>=r.xpRequired){
        userData.xp-=r.xpRequired;
        r.collected=r.collected? r.collected+1:1;
        db.ref('users/'+userId+'/rewards/'+key).set(r).then(()=>{renderRewards(); renderXP(); renderLevel();});
      }else alert('XP insuficiente!');
    };
    div.appendChild(btn);
    rewardList.appendChild(div);
  });
}

// ================= LOGOUT =================
function logout(){ auth.signOut().then(showLogin); }

</script>
</body>
</html>
