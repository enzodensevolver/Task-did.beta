<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Trilha da Rotina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Trebuchet MS',Arial}
body{
  width:100vw;height:100vh;
  background:linear-gradient(180deg,#2563eb,#38bdf8);
  overflow:hidden;color:white;
}

/* ================= TELAS ================= */
.screen{display:none;width:100%;height:100%}
.screen.active{display:flex}

/* ================= LOGIN ================= */
#login{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
}
#login input{
  width:260px;padding:12px;
  border-radius:12px;border:none;
}
#login button{
  width:260px;padding:12px;
  border:none;border-radius:14px;
  background:#22c55e;color:white;
  font-size:16px;cursor:pointer;
}

/* ================= DASHBOARD ================= */
#dashboard{flex-direction:column}

/* TOP BAR */
#topBar{
  position:fixed;top:12px;left:12px;
  display:flex;flex-direction:column;
  gap:12px;z-index:20;
}
.topBtn{
  width:56px;height:56px;
  border-radius:50%;border:none;
  font-size:26px;
  background:white;cursor:pointer;
}

/* ================= MAPA ================= */
#map{
  flex:1;overflow-y:auto;
  padding-top:120px;
}
.node{
  width:150px;margin:70px auto;
  text-align:center;
  animation:float 3s infinite ease-in-out;
}
.node:nth-child(even){margin-left:55%}
.node:nth-child(odd){margin-right:55%}

.nodeBox{
  background:linear-gradient(180deg,#22c55e,#16a34a);
  padding:26px;border-radius:26px;
  font-size:32px;cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,.4);
}
.nodeName{margin-top:8px;font-weight:bold}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* ================= MODAIS ================= */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
  z-index:30;
}
.modalContent{
  background:white;color:black;
  width:320px;padding:20px;
  border-radius:18px;
}
.modalContent input, .modalContent button{
  width:100%;padding:10px;margin-top:10px;
}

/* ================= PLANILHA ================= */
.table{
  width:100%;border-collapse:collapse;
}
.table th,.table td{
  border:1px solid #ccc;
  padding:8px;text-align:center;
}

/* ================= LEVEL ================= */
#levelBox{
  position:fixed;bottom:14px;right:14px;
  background:gold;color:black;
  padding:10px 16px;border-radius:14px;
  font-weight:bold;
}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login" class="screen active">
  <h1>🌟 Trilha da Rotina</h1>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Criar conta</button>
  <p id="msg"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="screen">

  <div id="topBar">
    <button class="topBtn" onclick="openMissionSheet()">➕</button>
    <button class="topBtn" onclick="openRewards()">🏪</button>
    <button class="topBtn" onclick="openProgress()">📊</button>
    <button class="topBtn" onclick="logout()">🚪</button>
  </div>

  <div id="map"></div>
</div>

<div id="levelBox">Nível 1</div>

<!-- ================= MODAIS ================= -->
<div id="missionModal" class="modal">
  <div class="modalContent">
    <h3>Nova Missão</h3>
    <input id="mName" placeholder="Nome">
    <input id="mPoints" type="number" placeholder="Pontos de Rotina">
    <input id="mHour" type="time">
    <button onclick="saveMission()">Salvar</button>
    <button onclick="closeModals()">Fechar</button>
  </div>
</div>

<div id="finishModal" class="modal">
  <div class="modalContent">
    <h3 id="finishTitle"></h3>
    <button onclick="finishMission()">Concluir</button>
    <button onclick="closeModals()">Cancelar</button>
  </div>
</div>

<!-- ================= FIREBASE ================= -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.appspot.com",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let uid=null;
let missions={};
let selected=null;
let points=0;

/* ================= AUTH ================= */
function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
    .then(()=>msg.innerText="Conta criada")
    .catch(e=>msg.innerText=e.message)
}
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
    .then(()=>msg.innerText="Login realizado")
    .catch(e=>msg.innerText=e.message)
}
auth.onAuthStateChanged(user=>{
  if(!user)return;
  uid=user.uid;
  document.getElementById('login').classList.remove('active');
  document.getElementById('dashboard').classList.add('active');
  loadMissions();
  loadPoints();
});
function logout(){auth.signOut();location.reload()}

/* ================= MISSÕES ================= */
function openMissionSheet(){
  document.getElementById('missionModal').style.display='flex';
}
function saveMission(){
  const name=mName.value;
  const pts=parseInt(mPoints.value);
  const hour=mHour.value;
  if(!name||!pts||!hour)return;
  db.ref(`users/${uid}/missions`).push({
    name,pts,hour,done:false,lastDone:""
  });
  closeModals();
}
function loadMissions(){
  db.ref(`users/${uid}/missions`).on('value',s=>{
    missions=s.val()||{};
    renderMap();
  });
}
function renderMap(){
  map.innerHTML="";
  Object.keys(missions).forEach(k=>{
    const m=missions[k];
    if(m.done && m.lastDone===today())return;
    const div=document.createElement('div');
    div.className="node";
    div.innerHTML=`<div class="nodeBox">⭐</div><div class="nodeName">${m.name}</div>`;
    div.onclick=()=>openFinish(k);
    map.appendChild(div);
  });
}
function openFinish(k){
  selected=k;
  finishTitle.innerText=missions[k].name;
  finishModal.style.display='flex';
}
function finishMission(){
  const m=missions[selected];
  if(m.lastDone===today())return;
  points+=m.pts;
  db.ref(`users/${uid}/points`).set(points);
  db.ref(`users/${uid}/missions/${selected}`).update({
    lastDone:today()
  });
  closeModals();
}
function today(){
  return new Date().toISOString().split('T')[0];
}

/* ================= PONTOS ================= */
function loadPoints(){
  db.ref(`users/${uid}/points`).on('value',s=>{
    points=s.val()||0;
    const lvl=Math.floor(points/1000)+1;
    levelBox.innerText="Nível "+lvl;
  });
}

/* ================= UTILS ================= */
function closeModals(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
}
</script>

</body>
  </html>
