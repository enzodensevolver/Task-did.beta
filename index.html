<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#6366f1,#22c55e);height:100vh;display:flex;justify-content:center;align-items:center}
#box{background:#fff;padding:25px;border-radius:15px;width:320px;text-align:center}
input,button{width:100%;padding:10px;margin:6px 0}
</style>
</head>

<body>
<div id="box">
<h2>🌟 Minha Rotina</h2>
<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button onclick="register()">Criar conta</button>
<button onclick="login()">Entrar</button>
<p id="msg"></p>
</div>

<script>
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(c=>{
db.collection("users").doc(c.user.uid).set({
name:name.value,
email:email.value,
xp:0,
level:1,
role:"user"
});
window.location="dashboard.html";
})
.catch(e=>msg.innerText=e.message);
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>window.location="dashboard.html")
.catch(e=>msg.innerText=e.message);
}
</script>
</body>
</html>
