<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rotina Gameificada</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:linear-gradient(180deg,#2196f3,#00bcd4);
}
.screen{display:none;min-height:100vh;padding:20px}
.screen.active{display:block}

.card{
  background:#fff;
  max-width:420px;
  margin:60px auto;
  padding:25px;
  border-radius:16px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button{border:none;font-weight:bold;cursor:pointer}
.btn-create{background:#4caf50;color:#fff}
.btn-login{background:#2196f3;color:#fff}
.btn-logout{background:#f44336;color:#fff}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
}
.level{
  background:rgba(255,255,255,.25);
  padding:8px 14px;
  border-radius:20px;
  font-weight:bold;
}

.panel{
  background:white;
  margin-top:20px;
  padding:20px;
  border-radius:16px;
}

.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f0f0f0;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}
.task button{
  padding:6px 10px;
  border-radius:6px;
  margin-left:5px;
  color:white;
}
.btn-ok{background:#4caf50}
.btn-del{background:#f44336}
#msg{text-align:center;margin-top:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="card">
    <h2>🎮 Minha Rotina</h2>
    <input id="name" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button class="btn-create" onclick="register()">Criar conta</button>
    <button class="btn-login" onclick="login()">Entrar</button>
    <div id="msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" class="screen">
  <div class="header">
    <h2>📋 Missões</h2>
    <div class="level" id="levelLabel">Lv 1</div>
  </div>

  <div class="panel">
    <h3>➕ Criar missão</h3>
    <input id="taskName" placeholder="Nome da missão">
    <input id="taskXP" type="number" placeholder="XP da missão">
    <button onclick="createTask()">Adicionar</button>
  </div>

  <div class="panel">
    <h3>🗂 Missões ativas</h3>
    <div id="taskList"></div>
  </div>

  <button class="btn-logout" onclick="logout()">Sair</button>
</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.appspot.com",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ================= VARIÁVEIS =================
const loginScreen = document.getElementById("loginScreen");
const dashboardScreen = document.getElementById("dashboardScreen");
const taskList = document.getElementById("taskList");
const levelLabel = document.getElementById("levelLabel");
const msg = document.getElementById("msg");

let userId;
let userData;

// ================= AUTH =================
auth.onAuthStateChanged(user=>{
  if(user){
    userId=user.uid;
    db.ref("users/"+userId).once("value").then(snap=>{
      userData=snap.val();
      showDashboard();
      renderTasks();
      updateLevel();
    });
  }
});

// ================= TELAS =================
function showDashboard(){
  loginScreen.classList.remove("active");
  dashboardScreen.classList.add("active");
}

// ================= LOGIN =================
function register(){
  const name=document.getElementById("name").value.trim();
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  if(!name||!email||!password){msg.innerText="Preencha tudo";return;}

  auth.createUserWithEmailAndPassword(email,password)
    .then(cred=>{
      return db.ref("users/"+cred.user.uid).set({
        name,email,xp:0,level:1,tasks:{}
      });
    })
    .catch(e=>msg.innerText=e.message);
}

function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).catch(e=>msg.innerText=e.message);
}

function logout(){
  auth.signOut();
  location.reload();
}

// ================= MISSÕES =================
function createTask(){
  const name=document.getElementById("taskName").value.trim();
  const xp=parseInt(document.getElementById("taskXP").value);
  if(!name||isNaN(xp))return;

  const id="task_"+Date.now();
  userData.tasks[id]={name,xp,done:false};
  saveUser();
  renderTasks();
}

function renderTasks(){
  taskList.innerHTML="";
  for(let id in userData.tasks){
    const t=userData.tasks[id];
    if(t.done)continue;

    const div=document.createElement("div");
    div.className="task";
    div.innerHTML=`
      <span>${t.name} (+${t.xp} XP)</span>
      <div>
        <button class="btn-ok" onclick="completeTask('${id}')">Concluir</button>
        <button class="btn-del" onclick="deleteTask('${id}')">Excluir</button>
      </div>`;
    taskList.appendChild(div);
  }
}

function completeTask(id){
  const t=userData.tasks[id];
  t.done=true;
  userData.xp+=t.xp;

  while(userData.xp>=1000){
    userData.xp-=1000;
    userData.level++;
  }
  saveUser();
  renderTasks();
  updateLevel();
}

function deleteTask(id){
  if(!confirm("Excluir missão?"))return;
  delete userData.tasks[id];
  saveUser();
  renderTasks();
}

// ================= UTIL =================
function updateLevel(){
  levelLabel.innerText="Lv "+userData.level;
}
function saveUser(){
  db.ref("users/"+userId).set(userData);
}
</script>

</body>
</html>
