<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sua Rotina Gamificada</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  background: linear-gradient(#1e90ff, #00bfff);
  overflow: hidden;
}

/* ---------- TELAS ---------- */
.screen {
  display: none;
  width: 100%;
  height: 100%;
}

.active {
  display: flex;
}

/* ---------- LOGIN ---------- */
#loginScreen {
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

input, button {
  padding: 12px;
  margin: 6px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  background: #2ecc71;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* ---------- DASHBOARD ---------- */
#dashboard {
  flex-direction: column;
  position: relative;
}

/* Top buttons */
.topLeft {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.iconBtn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 24px;
}

/* Level */
#levelBox {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  border-radius: 10px;
  color: white;
}

/* ---------- TRILHA ---------- */
#trail {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.mission {
  background: white;
  border-radius: 12px;
  padding: 10px;
  margin: 10px;
  width: 200px;
  text-align: center;
  cursor: pointer;
}

/* ---------- MODAL ---------- */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modalContent {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}

/* ---------- TABLE ---------- */
table {
  width: 100%;
  background: white;
  border-radius: 10px;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ccc;
  text-align: center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h1>Entrar</h1>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <div class="topLeft">
    <button class="iconBtn" onclick="openMissionManager()">+</button>
    <button class="iconBtn" onclick="openCompleted()">✔</button>
    <button class="iconBtn" onclick="openRewards()">🎁</button>
  </div>

  <div id="trail"></div>

  <div id="levelBox">
    Level: <span id="level">1</span><br>
    XP: <span id="xp">0</span>
  </div>
</div>

<!-- MODALS -->
<div id="missionModal" class="modal">
  <div class="modalContent">
    <h3 id="missionTitle"></h3>
    <button onclick="completeMission()">Concluir</button>
    <button onclick="closeModal()">Voltar</button>
  </div>
</div>

<!-- SCRIPT -->
<script>
/* ---------- FIREBASE ---------- */
firebase.initializeApp({
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site"
});

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let selectedMission = null;

/* ---------- AUTH ---------- */
function login() {
  const email = email.value;
  const password = password.value;

  auth.signInWithEmailAndPassword(email, password)
    .then(res => {
      currentUser = res.user;
      showDashboard();
    })
    .catch(() => {
      auth.createUserWithEmailAndPassword(email, password)
        .then(res => {
          currentUser = res.user;
          initUser();
          showDashboard();
        });
    });
}

function initUser() {
  db.ref("users/" + currentUser.uid).set({
    xp: 0,
    level: 1,
    lastReset: new Date().toDateString()
  });
}

/* ---------- UI ---------- */
function showDashboard() {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  dashboard.classList.add("active");
  loadData();
}

/* ---------- MISSIONS ---------- */
function loadData() {
  resetDaily();
  loadStats();
  loadMissions();
}

function resetDaily() {
  const today = new Date().toDateString();
  db.ref("users/" + currentUser.uid + "/lastReset").once("value", snap => {
    if (snap.val() !== today) {
      db.ref("completed/" + currentUser.uid).remove();
      db.ref("users/" + currentUser.uid + "/lastReset").set(today);
    }
  });
}

function loadStats() {
  db.ref("users/" + currentUser.uid).on("value", snap => {
    xp.innerText = snap.val().xp;
    level.innerText = snap.val().level;
  });
}

function loadMissions() {
  trail.innerHTML = "";
  db.ref("missions/" + currentUser.uid).orderByChild("time").once("value", snap => {
    snap.forEach(child => {
      const div = document.createElement("div");
      div.className = "mission";
      div.innerText = child.val().name;
      div.onclick = () => openMission(child.key, child.val());
      trail.appendChild(div);
    });
  });
}

function openMission(id, data) {
  selectedMission = { id, data };
  missionTitle.innerText = data.name;
  missionModal.style.display = "flex";
}

function completeMission() {
  const date = new Date().toISOString();
  const xpGain = selectedMission.data.xp;

  db.ref("completed/" + currentUser.uid + "/" + selectedMission.id).push(date);

  db.ref("users/" + currentUser.uid).transaction(user => {
    user.xp += xpGain;
    user.level = Math.floor(user.xp / 1000) + 1;
    return user;
  });

  closeModal();
  loadMissions();
}

function closeModal() {
  missionModal.style.display = "none";
}

/* ---------- PLACEHOLDERS ---------- */
function openMissionManager(){ alert("Editor de missões será explicado depois"); }
function openCompleted(){ alert("Histórico será explicado depois"); }
function openRewards(){ alert("Recompensas serão explicadas depois"); }
</script>

</body>
</html>
