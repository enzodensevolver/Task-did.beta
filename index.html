<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rotina Gameificada</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
*{box-sizing:border-box;font-family:'Trebuchet MS',Arial}
body{
  margin:0;
  width:100vw;
  height:100vh;
  background:linear-gradient(180deg,#2563eb,#38bdf8);
  overflow:hidden;
}

/* LOGIN */
#login{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  background:white;
  padding:30px;
  width:320px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  text-align:center;
}
input,button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
}
button{
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.green{background:#22c55e;color:white}
.blue{background:#2563eb;color:white}
.red{background:#ef4444;color:white}

/* TOPO */
#top{
  position:fixed;
  top:15px;
  left:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:10;
}
.top-btn{
  width:56px;height:56px;
  border-radius:50%;
  font-size:26px;
  border:none;
  background:white;
  box-shadow:0 6px 12px rgba(0,0,0,.4);
}

/* TRILHA */
#trail{
  position:absolute;
  inset:0;
  padding-top:120px;
  overflow-y:auto;
}
.mission{
  width:160px;
  margin:70px auto;
  text-align:center;
}
.mission:nth-child(even){margin-left:55%}
.mission:nth-child(odd){margin-right:55%}
.mission-box{
  background:linear-gradient(180deg,#22c55e,#16a34a);
  border-radius:30px;
  padding:28px;
  font-size:36px;
  box-shadow:0 10px 18px rgba(0,0,0,.4);
}
.mission-name{
  color:white;
  margin-top:10px;
  font-weight:bold;
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}
#modal-content{
  background:white;
  padding:25px;
  width:300px;
  border-radius:20px;
  text-align:center;
}

/* LEVEL */
#level{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#fde047;
  padding:10px 14px;
  border-radius:16px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Rotina Gameificada</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button class="green" onclick="register()">Criar conta</button>
    <button class="blue" onclick="loginUser()">Entrar</button>
    <p id="msg"></p>
  </div>
</div>

<!-- TOPO -->
<div id="top" style="display:none">
  <button class="top-btn" onclick="openCreate()">➕</button>
  <button class="top-btn" onclick="openHistory()">✔️</button>
  <button class="top-btn" onclick="openRewards()">🎁</button>
</div>

<!-- TRILHA -->
<div id="trail" style="display:none"></div>

<!-- LEVEL -->
<div id="level" style="display:none"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modal-content"></div>
</div>

<script>
// 🔥 FIREBASE CONFIG
firebase.initializeApp({
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site"
});

const auth = firebase.auth();
const db = firebase.database();

let uid, user;

// 🔐 AUTH
auth.onAuthStateChanged(u=>{
  if(!u) return;
  uid=u.uid;
  db.ref("users/"+uid).once("value").then(s=>{
    if(!s.exists()){
      user={points:0,level:1,missions:{},rewards:{}};
      db.ref("users/"+uid).set(user);
    }else user=s.val();
    startApp();
  });
});

// LOGIN
function register(){
  auth.createUserWithEmailAndPassword(
    email.value,password.value
  ).catch(e=>msg.innerText=e.message);
}
function loginUser(){
  auth.signInWithEmailAndPassword(
    email.value,password.value
  ).catch(e=>msg.innerText=e.message);
}

// START
function startApp(){
  login.style.display="none";
  top.style.display="flex";
  trail.style.display="block";
  level.style.display="block";
  render();
}

// RENDER
function render(){
  trail.innerHTML="";
  level.innerText="⭐ Lv "+Math.floor(user.points/1000+1);
  for(let id in user.missions){
    let m=user.missions[id];
    if(m.completedToday) continue;
    let div=document.createElement("div");
    div.className="mission";
    div.innerHTML=`
      <div class="mission-box" onclick="openMission('${id}')">🏆</div>
      <div class="mission-name">${m.name}</div>
    `;
    trail.appendChild(div);
  }
}

// COMPLETE
function openMission(id){
  modal.style.display="flex";
  modal-content.innerHTML=`
    <h3>${user.missions[id].name}</h3>
    <button class="green" onclick="complete('${id}')">Concluir</button>
    <button onclick="closeModal()">Cancelar</button>
  `;
}
function complete(id){
  let m=user.missions[id];
  let today=new Date().toISOString().slice(0,10);
  if(m.last===today) return;
  m.last=today;
  m.completedToday=true;
  m.count=(m.count||0)+1;
  user.points+=m.points;
  db.ref("users/"+uid).set(user);
  closeModal();
  render();
}

// CREATE
function openCreate(){
  modal.style.display="flex";
  modal-content.innerHTML=`
    <h3>Criar missão</h3>
    <input id="mn" placeholder="Nome">
    <input id="mp" type="number" placeholder="Pontos">
    <button class="green" onclick="saveMission()">Salvar</button>
    <button onclick="closeModal()">Cancelar</button>
  `;
}
function saveMission(){
  let id="m"+Date.now();
  user.missions[id]={
    name:mn.value,
    points:+mp.value,
    completedToday:false
  };
  db.ref("users/"+uid).set(user);
  closeModal();
  render();
}

// RESET DAILY
setInterval(()=>{
  let today=new Date().toISOString().slice(0,10);
  for(let id in user.missions){
    if(user.missions[id].last!==today)
      user.missions[id].completedToday=false;
  }
  db.ref("users/"+uid).set(user);
  render();
},60000);

function openHistory(){alert("Histórico em breve")}
function openRewards(){alert("Recompensas em breve")}
function closeModal(){modal.style.display="none"}
</script>
</body>
</html>
