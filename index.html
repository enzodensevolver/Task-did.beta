<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Trilha da Rotina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Firebase v8 (compatível com GitHub Pages) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      background: linear-gradient(180deg, #1e90ff, #60a5fa);
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      padding: 20px;
    }

    .active { display: block; }

    h1, h2 { text-align: center; margin: 10px 0; }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .btn {
      background: #22c55e;
      color: #fff;
      width: 100%;
      margin-top: 10px;
    }

    .btn-red { background: #ef4444; }
    .btn-blue { background: #2563eb; }

    /* LOGIN */
    #login {
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 360px;
      margin: auto;
      height: 100%;
    }

    /* HEADER */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    /* TRILHA */
    #trail {
      position: relative;
      width: 100%;
      height: calc(100% - 100px);
      overflow-y: auto;
      padding-bottom: 100px;
    }

    .mission {
      width: 110px;
      margin: 40px auto;
      text-align: center;
      cursor: pointer;
    }

    .mission-icon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #34d399;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: auto;
    }

    .mission.done .mission-icon {
      background: #9ca3af;
    }

    /* LEVEL */
    #levelBox {
      position: fixed;
      bottom: 15px;
      right: 15px;
      background: rgba(0,0,0,0.4);
      padding: 10px 16px;
      border-radius: 20px;
      font-weight: bold;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #fff;
      color: #000;
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h1>🌟 Trilha da Rotina</h1>
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Senha" />
  <button class="btn" onclick="login()">Entrar</button>
  <button class="btn btn-blue" onclick="register()">Criar conta</button>
  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <div class="top-bar">
    <div class="icon-btn" onclick="openCreate()">➕</div>
    <div class="icon-btn" onclick="openStats()">✔️</div>
    <div class="icon-btn" onclick="logout()">🚪</div>
  </div>

  <h2>🌲 Caminho de Troféus</h2>
  <div id="trail"></div>
</div>

<div id="levelBox">Nível 1</div>

<!-- MODAL CRIAR -->
<div id="createModal" class="modal">
  <div class="modal-content">
    <h3>Nova Missão</h3>
    <input id="mName" placeholder="Nome da missão" />
    <input id="mPoints" type="number" placeholder="Pontos de rotina" />
    <button class="btn" onclick="saveMission()">Salvar</button>
    <button class="btn btn-red" onclick="closeModals()">Voltar</button>
  </div>
</div>

<!-- MODAL CONCLUIR -->
<div id="finishModal" class="modal">
  <div class="modal-content">
    <h3 id="finishTitle"></h3>
    <button class="btn" onclick="finishMission()">Concluir</button>
    <button class="btn btn-red" onclick="closeModals()">Cancelar</button>
  </div>
</div>

<script>
  // FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
    authDomain: "sua-rotina-em-um-site.firebaseapp.com",
    databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
    projectId: "sua-rotina-em-um-site",
    storageBucket: "sua-rotina-em-um-site.appspot.com",
    messagingSenderId: "774359583618",
    appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  let uid = null;
  let missions = {};
  let selectedMission = null;

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function register() {
    auth.createUserWithEmailAndPassword(email.value, password.value)
      .then(() => msg.innerText = 'Conta criada!')
      .catch(e => msg.innerText = e.message);
  }

  function login() {
    auth.signInWithEmailAndPassword(email.value, password.value)
      .then(() => msg.innerText = 'Login realizado')
      .catch(e => msg.innerText = e.message);
  }

  auth.onAuthStateChanged(user => {
    if (!user) return;
    uid = user.uid;
    show('dashboard');
    loadMissions();
  });

  function logout() {
    auth.signOut();
    show('login');
  }

  function openCreate() {
    document.getElementById('createModal').style.display = 'flex';
  }

  function openStats() {
    alert('Tela de estatísticas será expandida na próxima etapa');
  }

  function closeModals() {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
  }

  function saveMission() {
    const name = mName.value.trim();
    const points = parseInt(mPoints.value);
    if (!name || isNaN(points)) return alert('Preencha tudo');

    const key = db.ref().child('missions').push().key;
    db.ref('users/' + uid + '/missions/' + key).set({
      name, points, done: false
    });

    closeModals();
    mName.value = '';
    mPoints.value = '';
    loadMissions();
  }

  function loadMissions() {
    db.ref('users/' + uid + '/missions').on('value', snap => {
      missions = snap.val() || {};
      renderTrail();
    });
  }

  function renderTrail() {
    const trail = document.getElementById('trail');
    trail.innerHTML = '';

    Object.keys(missions).forEach((k, i) => {
      const m = missions[k];
      if (m.done) return;

      const div = document.createElement('div');
      div.className = 'mission';
      div.innerHTML = `
        <div class="mission-icon">⭐</div>
        <div>${m.name}</div>
      `;
      div.onclick = () => openFinish(k);
      trail.appendChild(div);
    });
  }

  function openFinish(key) {
    selectedMission = key;
    finishTitle.innerText = missions[key].name;
    finishModal.style.display = 'flex';
  }

  function finishMission() {
    db.ref('users/' + uid + '/missions/' + selectedMission + '/done').set(true);
    closeModals();
  }
</script>
</body>
</html>
