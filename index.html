<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina</title>

<!-- Firebase 8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#6366f1,#22c55e);
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  background:white;
  width:100%;
  max-width:380px;
  padding:30px;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
  text-align:center;
}
h1{margin:0 0 10px;}
p{margin:0 0 20px;color:#555;}
input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
.btn-create{background:#22c55e;color:white;}
.btn-login{background:#6366f1;color:white;}
#msg{margin-top:10px;color:#ef4444;}
</style>
</head>

<body>
<div class="card">
<h1>🚀 Minha Rotina</h1>
<p>Crie hábitos, ganhe XP e evolua</p>

<select id="langSelect">
  <option value="pt">🇧🇷 Português</option>
  <option value="en">🇺🇸 English</option>
  <option value="es">🇪🇸 Español</option>
</select>

<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button class="btn-create" onclick="register()">Criar conta</button>
<button class="btn-login" onclick="login()">Entrar</button>

<p id="msg"></p>
</div>

<script>
const msg = document.getElementById("msg");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const langSelect = document.getElementById("langSelect");

const ADMIN_EMAIL = "enzo.n.sabino@gmail.com";

function register(){
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  const lang = langSelect.value;

  if(!name || !email || !password){
    msg.innerText = "Preencha todos os campos!";
    return;
  }

  auth.createUserWithEmailAndPassword(email,password)
  .then(cred=>{
    const role = email === ADMIN_EMAIL ? "admin" : "user";
    return db.collection("users").doc(cred.user.uid).set({
      name,
      email,
      xp:0,
      level:1,
      lang,
      role,
      tasks:[]
    }).then(()=> role);
  })
  .then(role=>{
    window.location = role === "admin" ? "admin.html" : "dashboard.html";
  })
  .catch(e=>msg.innerText=e.message);
}

function login(){
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email || !password){
    msg.innerText = "Preencha todos os campos!";
    return;
  }

  auth.signInWithEmailAndPassword(email,password)
  .then(cred=>{
    return db.collection("users").doc(cred.user.uid).get();
  })
  .then(doc=>{
    const role = doc.data().role || "user";
    window.location = role === "admin" ? "admin.html" : "dashboard.html";
  })
  .catch(e=>msg.innerText=e.message);
}
</script>
</body>
</html>
