<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina Gameificada</title>
<!-- Firebase 8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
/* RESET E GERAL */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Arial',sans-serif;background:linear-gradient(135deg,#f97316,#f43f5e);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;border:none;font-weight:bold;border-radius:10px;padding:10px;transition:0.2s;}
button:hover{opacity:0.8;}
.card{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.2);width:95%;max-width:900px;margin:10px;}
input, select{padding:10px;margin:8px 0;border-radius:10px;border:1px solid #ccc;width:100%;}

/* LOGIN */
#loginCard{text-align:center;}
#loginCard h1{color:#facc15;margin-bottom:10px;}
#loginCard button{width:48%;margin:5px;}

/* DASHBOARD TRILHA */
#dashboardCard{display:none;position:relative;min-height:90vh;overflow-y:auto;background:url('https://i.ibb.co/7Q3YbM0/floresta-fundo.png') no-repeat center/cover;padding:20px;}
.trilha{display:flex;flex-wrap:wrap;width:100%;justify-content:flex-start;position:relative;}
.missao{position:relative;background:#22c55e;color:white;padding:10px 15px;margin:10px;border-radius:15px;cursor:pointer;display:flex;flex-direction:column;align-items:center;transition:0.3s;}
.missao:hover{transform:scale(1.1);}
.missao .nomeMissao{margin-top:5px;font-size:14px;text-align:center;}
#levelDisplay{position:fixed;bottom:20px;right:20px;background:#f59e0b;color:white;padding:10px 15px;border-radius:20px;font-weight:bold;box-shadow:0 5px 15px rgba(0,0,0,.3);}

/* PAGINA CRIAR MISSÕES (PLANILHA) */
#createCard{display:none;}
#createCard table{width:100%;border-collapse:collapse;}
#createCard th, #createCard td{border:1px solid #ccc;padding:10px;text-align:center;}
#createCard th{background:#22c55e;color:white;}

/* PAGINA COMPLETAS */
#completedCard{display:none;}
.completedMissao{background:#6366f1;color:white;padding:10px;margin:5px;border-radius:15px;display:flex;justify-content:space-between;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
<h1>🚀 Minha Rotina</h1>
<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button onclick="register()">Criar Conta</button>
<button onclick="login()">Entrar</button>
<p id="msg" style="color:red;"></p>
</div>

<!-- DASHBOARD TRILHA -->
<div class="card" id="dashboardCard">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
<button onclick="showCreate()">➕ Missão</button>
<button onclick="showCompleted()">✅ Missões</button>
<button onclick="logout()">🚪 Sair</button>
</div>
<div class="trilha" id="trilha"></div>
<div id="levelDisplay">Level: 1</div>
</div>

<!-- PAGINA CRIAR MISSÕES -->
<div class="card" id="createCard">
<h2>📋 Criar Missões</h2>
<table>
<thead>
<tr><th>Nome</th><th>XP</th><th>Hora</th><th>Ações</th></tr>
</thead>
<tbody id="missaoTable"></tbody>
</table>
<br>
<button onclick="voltarTrilha()">⬅ Voltar</button>
</div>

<!-- PAGINA COMPLETAS -->
<div class="card" id="completedCard">
<h2>🎖️ Missões Completas</h2>
<div id="completasList"></div>
<br>
<button onclick="voltarTrilha()">⬅ Voltar</button>
</div>

<script>
// ================== FIREBASE ==================
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ================== ELEMENTOS ==================
const loginCard = document.getElementById('loginCard');
const dashboardCard = document.getElementById('dashboardCard');
const createCard = document.getElementById('createCard');
const completedCard = document.getElementById('completedCard');
const msg = document.getElementById('msg');
const nameInput = document.getElementById('name');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const trilha = document.getElementById('trilha');
const levelDisplay = document.getElementById('levelDisplay');
const missaoTable = document.getElementById('missaoTable');
const completasList = document.getElementById('completasList');

let userId = null;
let userData = null;

// ================== AUTENTICAÇÃO ==================
auth.onAuthStateChanged(user=>{
  if(!user){ showLogin(); return; }
  userId = user.uid;
  db.ref('users/'+userId).once('value').then(snap=>{
    userData = snap.val();
    if(!userData){
      userData = {name:nameInput.value,email:emailInput.value,xp:0,level:1,missoes:{},completed:{},rewards:{}};
      db.ref('users/'+userId).set(userData);
    }
    showDashboard();
    renderTrilha();
    updateLevel();
  });
});

// ================== FUNÇÕES LOGIN/REGISTER ==================
function register(){
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!name||!email||!password){ msg.innerText="Preencha todos os campos!"; return; }
  auth.createUserWithEmailAndPassword(email,password)
  .then(cred=>{
    userId = cred.user.uid;
    userData = {name,email,xp:0,level:1,missoes:{},completed:{},rewards:{}};
    db.ref('users/'+userId).set(userData);
    showDashboard();
  }).catch(e=>msg.innerText=e.message);
}

function login(){
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email||!password){ msg.innerText="Preencha todos os campos!"; return; }
  auth.signInWithEmailAndPassword(email,password)
  .then(cred=>{
    userId = cred.user.uid;
    db.ref('users/'+userId).once('value').then(snap=>{
      userData = snap.val();
      showDashboard();
      renderTrilha();
      updateLevel();
    });
  }).catch(e=>msg.innerText=e.message);
}

function logout(){
  auth.signOut().then(()=>{showLogin();});
}

// ================== VIEWS ==================
function showLogin(){ loginCard.style.display='block'; dashboardCard.style.display='none'; createCard.style.display='none'; completedCard.style.display='none'; }
function showDashboard(){ loginCard.style.display='none'; dashboardCard.style.display='block'; createCard.style.display='none'; completedCard.style.display='none'; }
function showCreate(){ loginCard.style.display='none'; dashboardCard.style.display='none'; createCard.style.display='block'; completedCard.style.display='none'; renderCreate(); }
function showCompleted(){ loginCard.style.display='none'; dashboardCard.style.display='none'; createCard.style.display='none'; completedCard.style.display='block'; renderCompleted(); }
function voltarTrilha(){ showDashboard(); renderTrilha(); }

// ================== TRILHA ==================
function renderTrilha(){
  trilha.innerHTML='';
  let sorted = Object.entries(userData.missoes).sort((a,b)=>a[1].hora.localeCompare(b[1].hora));
  sorted.forEach(([key,missao])=>{
    const div = document.createElement('div');
    div.className='missao';
    div.innerHTML=`<div class="nomeMissao">${missao.nome}</div>`;
    if(!missao.done){
      div.onclick = ()=>{
        const btn = document.createElement('button');
        btn.innerText='Concluir';
        btn.style.background='green';
        btn.onclick = ()=>{
          concluirMissao(key);
        };
        div.appendChild(btn);
      };
    } else div.style.opacity='0.5';
    trilha.appendChild(div);
  });
}

function concluirMissao(key){
  const missao = userData.missoes[key];
  const hoje = new Date().toLocaleDateString();
  if(!userData.completed[key]) userData.completed[key]=[];
  // só adiciona se não tiver concluído hoje
  if(!userData.completed[key].includes(hoje)){
    userData.completed[key].push(hoje);
    userData.xp += missao.xp;
    if(userData.xp>=1000){userData.level+=Math.floor(userData.xp/1000);userData.xp%=1000;}
    missao.done=true;
    db.ref('users/'+userId).set(userData);
    renderTrilha();
    updateLevel();
  }
}

function updateLevel(){ levelDisplay.innerText='Level: '+userData.level; }

// ================== CRIAR MISSÕES ==================
function renderCreate(){
  missaoTable.innerHTML='';
  Object.entries(userData.missoes).forEach(([key,missao])=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${missao.nome}</td><td>${missao.xp}</td><td>${missao.hora}</td>
    <td><button style="background:red;color:white;" onclick="removerMissao('${key}')">Remover</button></td>`;
    missaoTable.appendChild(tr);
  });
}

function criarMissao(nome,xp,hora){
  const key='m_'+Date.now();
  userData.missoes[key]={nome,nome, xp:Number(xp), hora:hora, done:false};
  db.ref('users/'+userId).set(userData);
  renderCreate();
  renderTrilha();
}

function removerMissao(key){
  delete userData.missoes[key];
  db.ref('users/'+userId).set(userData);
  renderCreate();
  renderTrilha();
}

// ================== COMPLETAS ==================
function renderCompleted(){
  completasList.innerHTML='';
  Object.entries(userData.completed).forEach(([key, datas])=>{
    const missao = userData.missoes[key]||{nome:key,xp:0};
    const totalXP = missao.xp*datas.length;
    const div=document.createElement('div');
    div.className='completedMissao';
    div.innerHTML=`<div>${missao.nome} (Total XP: ${totalXP})</div><div>${datas.join(', ')}</div>`;
    completasList.appendChild(div);
  });
}

// ================== REINÍCIO DIÁRIO ==================
setInterval(()=>{
  const now=new Date();
  if(now.getHours()===0 && now.getMinutes()===0){
    Object.values(userData.missoes).forEach(m=>m.done=false);
    db.ref('users/'+userId).set(userData);
    renderTrilha();
  }
},60000); // verifica a cada minuto
</script>

</body>
</html>
