<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  projectId: "sua-rotina-em-um-site"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>
</head>

<body style="
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#38bdf8,#22c55e);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
">

<div id="app" style="
background:white;
padding:25px;
border-radius:15px;
width:100%;
max-width:360px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
">

<h2>🌟 Bem-vindo</h2>

<input id="name" placeholder="Nome" style="width:100%;padding:10px;margin:8px 0">
<input id="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0">
<input id="password" type="password" placeholder="Senha" style="width:100%;padding:10px;margin:8px 0">

<button onclick="register()" style="
width:100%;
padding:10px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
margin-top:8px;
">
Criar conta
</button>

<button onclick="login()" style="
width:100%;
padding:10px;
background:#38bdf8;
color:white;
border:none;
border-radius:8px;
margin-top:8px;
">
Entrar
</button>

<p id="msg" style="color:red"></p>

</div>

<script>
const appDiv = document.getElementById("app");
const msg = document.getElementById("msg");

function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(cred=>{
    db.collection("users").doc(cred.user.uid).set({
      name: name.value,
      email: email.value,
      xp: 0,
      level: 1
    });
    appDiv.innerHTML = "<h2>🎉 Conta criada com sucesso!</h2>";
  })
  .catch(e=>msg.innerText = e.message);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=>{
    appDiv.innerHTML = "<h2>✅ Login realizado!</h2>";
  })
  .catch(e=>msg.innerText = e.message);
}
</script>

</body>
</html>
