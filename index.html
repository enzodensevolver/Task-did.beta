<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Sua Rotina</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="login-screen">
  <h1>Sua Rotina</h1>
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Senha" />
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Criar conta</button>
</div>

<div id="app" class="hidden">
  <header>
    <h2>🌲 Trilha da Rotina</h2>
    <button onclick="logout()">Sair</button>
  </header>

  <nav>
    <button onclick="show('missions')">Missões</button>
    <button onclick="show('create')">Criar</button>
    <button onclick="show('rewards')">Loja</button>
    <button onclick="show('progress')">Progresso</button>
  </nav>

  <section id="missions"></section>
  <section id="create" class="hidden"></section>
  <section id="rewards" class="hidden"></section>
  <section id="progress" class="hidden"></section>

  <div id="level-box">
    ⭐ Nível <span id="level">1</span><br>
    🟢 Pontos: <span id="points">0</span>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
