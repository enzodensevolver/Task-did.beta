<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// Configuração do Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#6366f1,#22c55e);
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  background:white;
  width:100%;
  max-width:380px;
  padding:30px;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
  text-align:center;
  animation:fade .6s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:none}
}
h1{margin:0 0 10px;}
p{margin:0 0 20px;color:#555;}
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
.btn-create{background:#22c55e;color:white;}
.btn-login{background:#6366f1;color:white;}
#msg{margin-top:10px;color:#ef4444;}
</style>
</head>

<body>
<div class="card" id="app">
<h1>🚀 Minha Rotina</h1>
<p>Crie hábitos, ganhe XP e evolua</p>

<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button class="btn-create" onclick="register()">Criar conta</button>
<button class="btn-login" onclick="login()">Entrar</button>

<p id="msg"></p>
</div>

<script>
const msg = document.getElementById("msg");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

function register(){
  if(!nameInput.value || !emailInput.value || !passwordInput.value){
    msg.innerText = "Preencha todos os campos!";
    return;
  }
  auth.createUserWithEmailAndPassword(emailInput.value,passwordInput.value)
  .then(cred=>{
    db.collection("users").doc(cred.user.uid).set({
      name: nameInput.value,
      email: emailInput.value,
      xp: 0,
      level: 1,
      lang: "pt",
      role: "user" // padrão todo usuário é user
    });
    window.location="dashboard.html";
  })
  .catch(e=>msg.innerText=e.message);
}

function login(){
  if(!emailInput.value || !passwordInput.value){
    msg.innerText = "Preencha todos os campos!";
    return;
  }
  auth.signInWithEmailAndPassword(emailInput.value,passwordInput.value)
  .then(()=>{window.location="dashboard.html";})
  .catch(e=>msg.innerText=e.message);
}
</script>
</body>
</html>
