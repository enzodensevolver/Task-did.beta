<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Trilha da Rotina</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:Arial, sans-serif;
  background:linear-gradient(#3b82f6,#1e40af);
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.hidden{display:none}

.card{
  background:white;
  padding:24px;
  border-radius:20px;
  width:90%;
  max-width:360px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  background:#22c55e;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

#path{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:24px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
  <div class="card">
    <h2>Entrar</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar conta</button>
    <p id="msg"></p>
  </div>
</div>

<!-- TRILHA -->
<div id="trail" class="screen hidden">
  <div id="path">🌟 Bem-vindo à Trilha da Rotina 🌟</div>
</div>

<script>
/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site"
});

const auth = firebase.auth();
const db = firebase.database();

let uid;

/* CONTROLE DE TELA */
function show(id){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("trail").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).then(()=>{
    msg.innerText = "login realizado";
  }).catch(e=>{
    msg.innerText = e.message;
  });
}

/* REGISTRO */
function register(){
  auth.createUserWithEmailAndPassword(
    email.value,
    password.value
  ).catch(e=>{
    msg.innerText = e.message;
  });
}

/* ESTE É O MAIS IMPORTANTE */
auth.onAuthStateChanged(user=>{
  if(!user) return;

  uid = user.uid;

  db.ref("users/"+uid).once("value").then(snap=>{
    if(!snap.exists()){
      db.ref("users/"+uid).set({
        total:0,
        missions:{}
      });
    }
    show("trail"); // 🔥 AQUI A TELA MUDA
  });
});
</script>

</body>
</html>
