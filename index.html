<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Trilha de Rotina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
}

body {
  margin: 0;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(#4facfe, #00f2fe);
  overflow: hidden;
}

/* TOPO */
#top-bar {
  position: fixed;
  top: 15px;
  left: 15px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
}

.top-btn {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: none;
  font-size: 28px;
  background: white;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0,0,0,.3);
}

/* TRILHA */
#trail {
  position: absolute;
  width: 100%;
  height: 100%;
  padding-top: 120px;
  overflow-y: auto;
}

/* MISSÃO */
.mission {
  width: 140px;
  margin: 60px auto;
  text-align: center;
  cursor: pointer;
  animation: pop 0.4s ease;
}

.mission:nth-child(even) {
  margin-left: 55%;
}

.mission:nth-child(odd) {
  margin-right: 55%;
}

.mission-icon {
  width: 120px;
  height: 120px;
  background: #fff;
  border-radius: 30px;
  box-shadow: 0 6px 12px rgba(0,0,0,.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}

.mission-name {
  margin-top: 8px;
  font-weight: bold;
  color: white;
  text-shadow: 1px 1px 2px #000;
}

/* MODAL */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  align-items: center;
  justify-content: center;
}

#modal-content {
  background: white;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  width: 280px;
}

#modal button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

#complete-btn {
  background: #4CAF50;
  color: white;
}

@keyframes pop {
  from { transform: scale(.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div id="top-bar">
  <button class="top-btn" onclick="addMission()">+</button>
</div>

<div id="trail"></div>

<div id="modal">
  <div id="modal-content">
    <h2 id="modal-title"></h2>
    <button id="complete-btn">Concluir</button>
  </div>
</div>

<script>
/* ===== DADOS ===== */
let missions = JSON.parse(localStorage.getItem("missions")) || [
  { id: 1, name: "Arrumar a cama", icon: "🛏️", done: false },
  { id: 2, name: "Escovar os dentes", icon: "🦷", done: false },
  { id: 3, name: "Fazer tarefa", icon: "📚", done: false }
];

let selectedMission = null;

/* ===== FUNÇÕES ===== */
function save() {
  localStorage.setItem("missions", JSON.stringify(missions));
}

function render() {
  const trail = document.getElementById("trail");
  trail.innerHTML = "";

  missions
    .filter(m => !m.done)
    .forEach(m => {
      const div = document.createElement("div");
      div.className = "mission";
      div.onclick = () => openMission(m.id);

      div.innerHTML = `
        <div class="mission-icon">${m.icon}</div>
        <div class="mission-name">${m.name}</div>
      `;

      trail.appendChild(div);
    });
}

function openMission(id) {
  selectedMission = missions.find(m => m.id === id);
  document.getElementById("modal-title").innerText = selectedMission.name;
  document.getElementById("modal").style.display = "flex";
}

document.getElementById("complete-btn").onclick = () => {
  selectedMission.done = true;
  save();
  closeModal();
  render();
};

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function addMission() {
  const name = prompt("Nome da missão:");
  if (!name) return;

  missions.push({
    id: Date.now(),
    name,
    icon: "⭐",
    done: false
  });

  save();
  render();
}

/* RESET À MEIA-NOITE */
function checkReset() {
  const last = localStorage.getItem("lastReset");
  const today = new Date().toDateString();

  if (last !== today) {
    missions.forEach(m => m.done = false);
    localStorage.setItem("lastReset", today);
    save();
  }
}

/* INIT */
checkReset();
render();
</script>

</body>
</html>
