<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minhas Tarefas</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
  background: #E6D3A3;
  color: #000;
  font-family: Arial;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

#lista {
  margin-top: 15px;
  padding: 0;
}

li {
  list-style: none;
  background: #FFF8DC;
  margin: 10px 0;
  padding: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

span {
  flex: 1;
  text-align: left;
  word-break: break-word;
}

.item-botoes button {
  width: auto;
  margin-left: 5px;
  padding: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Minhas Tarefas</h1>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar / Criar</button>
</div>

<div id="app" style="display:none;">
  <input id="tarefa" placeholder="Nova tarefa">

  <button onclick="adicionar()">➕ Tarefa normal</button>
  <button onclick="adicionar('diaria')">🔁 Tarefa diária</button>

  <ul id="lista"></ul>

  <button onclick="logout()">Sair</button>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;

// LOGIN
function login() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
    .catch(() => {
      auth.createUserWithEmailAndPassword(email, senha);
    });
}

// LOGOUT
function logout() {
  auth.signOut();
}

// DETECTAR USUÁRIO
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    carregar();
  } else {
    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

// ADICIONAR
function adicionar(tipo = "normal") {
  let input = document.getElementById("tarefa");
  let texto = input.value;

  if (texto === "") return;

  db.collection("tarefas").add({
    uid: user.uid,
    texto: texto,
    tipo: tipo,
    feito: false,
    data: new Date().toISOString().split("T")[0]
  });

  input.value = "";
}

// CARREGAR
function carregar() {
  db.collection("tarefas")
    .where("uid", "==", user.uid)
    .onSnapshot(snapshot => {

      let hoje = new Date().toISOString().split("T")[0];
      let lista = document.getElementById("lista");
      lista.innerHTML = "";

      snapshot.forEach(doc => {
        let t = doc.data();

        if (t.tipo === "normal" && t.data !== hoje) return;

        let li = document.createElement("li");

        let span = document.createElement("span");
        span.textContent = t.texto;

        if (t.tipo === "diaria") span.textContent += " 🔁";
        if (t.feito) span.style.opacity = "0.5";

        let botoes = document.createElement("div");
        botoes.className = "item-botoes";

        let btnCheck = document.createElement("button");
        btnCheck.textContent = "✔️";
        btnCheck.onclick = () => {
          db.collection("tarefas").doc(doc.id).update({
            feito: !t.feito
          });
        };

        let btnDelete = document.createElement("button");
        btnDelete.textContent = "🗑️";
        btnDelete.onclick = () => {
          db.collection("tarefas").doc(doc.id).delete();
        };

        botoes.appendChild(btnCheck);
        botoes.appendChild(btnDelete);

        li.appendChild(span);
        li.appendChild(botoes);

        lista.appendChild(li);
      });
    });
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
