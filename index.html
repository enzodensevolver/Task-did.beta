<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina</title>

<!-- Firebase versão simples -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
  background: #121212;
  color: white;
  text-align: center;
  font-family: Arial;
}
input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h1>🔥 Minha Rotina</h1>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar / Criar</button>
</div>

<div id="app" style="display:none;">
  <input id="tarefa">
  <button onclick="adicionar()">Adicionar</button>
  <ul id="lista"></ul>
  <button onclick="logout()">Sair</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;

// LOGIN
function login() {
  let email = emailInput.value;
  let senha = senhaInput.value;

  auth.signInWithEmailAndPassword(email, senha)
  .catch(() => {
    auth.createUserWithEmailAndPassword(email, senha);
  });
}

// LOGOUT
function logout() {
  auth.signOut();
}

// DETECTAR USUÁRIO
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    login.style.display = "none";
    app.style.display = "block";
    carregar();
  } else {
    login.style.display = "block";
    app.style.display = "none";
  }
});

// ADICIONAR
function adicionar() {
  let texto = tarefa.value;

  db.collection("tarefas").add({
    uid: user.uid,
    texto: texto,
    feito: false
  });

  tarefa.value = "";
}

// CARREGAR
function carregar() {
  db.collection("tarefas")
    .where("uid", "==", user.uid)
    .onSnapshot(snapshot => {

      lista.innerHTML = "";

      snapshot.forEach(doc => {
        let t = doc.data();

        let li = document.createElement("li");
        li.textContent = t.texto;

        if (t.feito) {
          li.style.textDecoration = "line-through";
        }

        li.onclick = () => {
          db.collection("tarefas").doc(doc.id).update({
            feito: !t.feito
          });
        };

        lista.appendChild(li);
      });
    });
}
</script>

</body>
</html>
