<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Trilha de Troféus</title>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#8fd3f4,#84fab0);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
.card{background:white;width:90%;max-width:800px;padding:20px;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.25);position:relative;}
button{cursor:pointer;border:none;border-radius:8px;padding:8px;font-weight:bold;}
.task{background:#f0f0f0;margin:5px 0;padding:10px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.trophy-path{display:flex;flex-wrap:wrap;margin:20px 0;}
.trophy-node{width:60px;height:60px;border-radius:50%;background:#ddd;margin:5px;display:flex;justify-content:center;align-items:center;font-size:24px;transition:0.5s;}
.trophy-node.completed{background:#f59e0b;color:white;}
.icon{position:absolute;font-size:24px;cursor:pointer;}
#addIcon{top:10px;left:10px;}
#historyIcon{top:10px;right:10px;}
#levelDisplay{bottom:10px;right:10px;font-weight:bold;font-size:18px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
#backBtn{position:absolute;top:10px;left:10px;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
<h1>🚀 Minha Trilha</h1>
<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button id="registerBtn" style="background:#22c55e;color:white;">Criar conta</button>
<button id="loginBtn" style="background:#6366f1;color:white;">Entrar</button>
<p id="msg" style="color:red;"></p>
</div>

<!-- TRILHA DE TROFÉUS -->
<div class="card" id="trailCard" style="display:none;">
<div id="addIcon" class="icon">➕</div>
<div id="historyIcon" class="icon">✔</div>
<div class="trophy-path" id="trophyPath"></div>
<div id="levelDisplay">Lv: 1</div>
</div>

<!-- ADICIONAR MISSÃO -->
<div class="card" id="addMissionCard" style="display:none;">
<div id="backBtn">⬅ Voltar</div>
<h3>Adicionar Missão</h3>
<table>
<tr><th>Missão</th><th>XP</th><th>Ação</th></tr>
<tr>
<td><input id="missionName" placeholder="Nome da missão"></td>
<td><input type="number" id="missionXP" placeholder="XP"></td>
<td><button id="saveMissionBtn" style="background:#22c55e;color:white;">Salvar</button></td>
</tr>
</table>
</div>

<!-- HISTÓRICO -->
<div class="card" id="historyCard" style="display:none;">
<div id="backBtnHistory">⬅ Voltar</div>
<h3>Histórico de Missões</h3>
<div id="historyList"></div>
</div>

<!-- FIREBASE 8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  databaseURL: "https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ================= ELEMENTOS =================
const loginCard = document.getElementById("loginCard");
const trailCard = document.getElementById("trailCard");
const addMissionCard = document.getElementById("addMissionCard");
const historyCard = document.getElementById("historyCard");

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msg = document.getElementById("msg");

const addIcon = document.getElementById("addIcon");
const historyIcon = document.getElementById("historyIcon");
const levelDisplay = document.getElementById("levelDisplay");
const trophyPath = document.getElementById("trophyPath");

const missionName = document.getElementById("missionName");
const missionXP = document.getElementById("missionXP");
const saveMissionBtn = document.getElementById("saveMissionBtn");
const backBtn = document.getElementById("backBtn");
const historyList = document.getElementById("historyList");
const backBtnHistory = document.getElementById("backBtnHistory");

let userId, userData;

// ================= FUNÇÕES =================
function showLogin(){ loginCard.style.display="block"; trailCard.style.display="none"; addMissionCard.style.display="none"; historyCard.style.display="none";}
function showTrail(){ loginCard.style.display="none"; trailCard.style.display="block"; addMissionCard.style.display="none"; historyCard.style.display="none"; renderTrail();}
function showAddMission(){ loginCard.style.display="none"; trailCard.style.display="none"; addMissionCard.style.display="block"; historyCard.style.display="none";}
function showHistory(){ loginCard.style.display="none"; trailCard.style.display="none"; addMissionCard.style.display="none"; historyCard.style.display="block"; renderHistory();}

// ================= LOGIN =================
document.getElementById("registerBtn").addEventListener("click", ()=>{
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!name||!email||!password){ msg.innerText="Preencha todos os campos!"; return;}
  auth.createUserWithEmailAndPassword(email,password).then(cred=>{
    userId = cred.user.uid;
    userData = {name,email,xp:0,tasks:{},history:[]};
    db.ref("users/"+userId).set(userData);
    showTrail();
  }).catch(e=>msg.innerText=e.message);
});

document.getElementById("loginBtn").addEventListener("click", ()=>{
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email||!password){ msg.innerText="Preencha todos os campos!"; return;}
  auth.signInWithEmailAndPassword(email,password).then(cred=>{
    userId = cred.user.uid;
    db.ref("users/"+userId).once("value").then(snap=>{
      userData = snap.val();
      showTrail();
    });
  }).catch(e=>msg.innerText=e.message);
});

// ================= TRAIL =================
function renderTrail(){
  trophyPath.innerHTML="";
  for(let key in userData.tasks){
    const t = userData.tasks[key];
    const node = document.createElement("div");
    node.className="trophy-node";
    if(t.done) node.classList.add("completed");
    node.innerText=t.done?"🏆":"🎯";
    node.title = `${t.name} (${t.xp} XP)`;
    trophyPath.appendChild(node);
  }
  const level = Math.floor(userData.xp/1000)+1;
  levelDisplay.innerText = "Lv: "+level;
}

// ================= ADD MISSION =================
addIcon.addEventListener("click", showAddMission);
backBtn.addEventListener("click", showTrail);
saveMissionBtn.addEventListener("click", ()=>{
  const name = missionName.value.trim();
  const xp = parseInt(missionXP.value);
  if(!name||isNaN(xp)){ alert("Preencha corretamente"); return;}
  const key = "task_"+Date.now();
  userData.tasks[key] = {name:name,xp:xp,done:false,date:null};
  db.ref("users/"+userId).set(userData).then(()=>{
    missionName.value=""; missionXP.value="";
    showTrail();
  });
});

// ================= HISTORY =================
historyIcon.addEventListener("click", showHistory);
backBtnHistory.addEventListener("click", showTrail);

function renderHistory(){
  historyList.innerHTML="";
  for(let key in userData.tasks){
    const t = userData.tasks[key];
    if(t.done){
      const date = t.date?new Date(t.date).toLocaleString():"-";
      historyList.innerHTML += `<div>${t.name} ✅ - Concluída em: ${date} (XP:${t.xp})</div>`;
    }
  }
}

// ================= COMPLETE TASK =================
trophyPath.addEventListener("click", (e)=>{
  const nodes = Array.from(trophyPath.children);
  const index = nodes.indexOf(e.target);
  if(index<0) return;
  const key = Object.keys(userData.tasks)[index];
  if(userData.tasks[key].done) return;
  userData.tasks[key].done = true;
  userData.tasks[key].date = Date.now();
  userData.xp += userData.tasks[key].xp;
  db.ref("users/"+userId).set(userData).then(renderTrail);
});

</script>
</body>
</html>
