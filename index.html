<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Trilha da Rotina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ================= FIREBASE V8 ================= -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ================= ESTILO ================= -->
<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Trebuchet MS', Arial, sans-serif;
}

/* BODY */
body{
  width:100vw;
  height:100vh;
  background:linear-gradient(180deg,#2563eb,#38bdf8);
  overflow:hidden;
}

/* TELAS */
.screen{
  display:none;
  width:100%;
  height:100%;
}
.screen.active{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  animation:fadeIn .4s ease;
}

/* ANIMAÇÕES */
@keyframes fadeIn{
  from{opacity:0;transform:scale(.97)}
  to{opacity:1;transform:scale(1)}
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* LOGIN */
#login h1{
  color:white;
  margin-bottom:20px;
}
#login input{
  width:260px;
  padding:12px;
  margin:6px;
  border:none;
  border-radius:14px;
}
#login button{
  width:260px;
  padding:12px;
  margin:6px;
  border:none;
  border-radius:14px;
  background:#22c55e;
  color:white;
  font-size:16px;
  cursor:pointer;
}
#msg{
  margin-top:10px;
  color:white;
}

/* DASHBOARD */
#dashboard{
  position:relative;
  padding-top:100px;
}

/* BARRA SUPERIOR */
#topBar{
  position:fixed;
  top:15px;
  left:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:20;
}
.topBtn{
  width:56px;
  height:56px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 6px 12px rgba(0,0,0,.35);
}

/* TRILHA */
#trail{
  width:100%;
  height:100%;
  overflow-y:auto;
  padding-bottom:200px;
}
.mission{
  width:170px;
  margin:80px auto;
  text-align:center;
  animation:float 3s infinite ease-in-out;
}
.mission:nth-child(even){margin-left:55%}
.mission:nth-child(odd){margin-right:55%}
.missionBox{
  background:linear-gradient(180deg,#22c55e,#16a34a);
  color:white;
  padding:24px;
  border-radius:28px;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 10px 18px rgba(0,0,0,.35);
}

/* PERSONAGEM */
#player{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  font-size:42px;
  transition:.4s;
}

/* LEVEL */
#levelBox{
  position:fixed;
  bottom:16px;
  right:16px;
  background:#fde047;
  padding:10px 16px;
  border-radius:16px;
  font-weight:bold;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:30;
}
.modalBox{
  background:white;
  padding:22px;
  border-radius:18px;
  width:300px;
}
.modalBox h3{
  margin-bottom:10px;
}
.modalBox input,
.modalBox button{
  width:100%;
  padding:10px;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="login" class="screen active">
  <h1>🌟 Trilha da Rotina</h1>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Criar conta</button>
  <p id="msg"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="screen">
  <div id="topBar">
    <button class="topBtn" onclick="openCreate()">➕</button>
    <button class="topBtn" onclick="openStore()">🏆</button>
    <button class="topBtn" onclick="logout()">🚪</button>
  </div>

  <div id="trail"></div>
  <div id="player">🧒</div>
  <div id="levelBox">Nível 1</div>
</div>

<!-- ================= MODAL MISSÃO ================= -->
<div id="createModal" class="modal">
  <div class="modalBox">
    <h3>Nova Missão</h3>
    <input id="mName" placeholder="Nome da missão">
    <input id="mPoints" type="number" placeholder="Pontos de Rotina">
    <button onclick="saveMission()">Salvar</button>
    <button onclick="closeModals()">Cancelar</button>
  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script>
/* ================= FIREBASE ================= */
firebase.initializeApp({
  apiKey:"AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain:"sua-rotina-em-um-site.firebaseapp.com",
  databaseURL:"https://sua-rotina-em-um-site-default-rtdb.firebaseio.com",
  projectId:"sua-rotina-em-um-site"
});
const auth=firebase.auth();
const db=firebase.database();

/* ================= ESTADO GLOBAL ================= */
let uid=null;
let missions={};
let pontos=0;

/* ================= UTIL ================= */
function today(){
  return new Date().toISOString().slice(0,10);
}
function show(id){
  document.querySelectorAll('.screen')
    .forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= AUTH ================= */
function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>msg.innerText="Conta criada com sucesso")
  .catch(e=>msg.innerText=e.message);
}
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>msg.innerText="Login realizado")
  .catch(e=>msg.innerText=e.message);
}
auth.onAuthStateChanged(user=>{
  if(!user)return;
  uid=user.uid;
  show('dashboard');
  loadUserData();
});
function logout(){
  auth.signOut();
  show('login');
}

/* ================= MISSÕES ================= */
function openCreate(){
  createModal.style.display='flex';
}
function closeModals(){
  createModal.style.display='none';
}
function saveMission(){
  const name=mName.value.trim();
  const pts=parseInt(mPoints.value);
  if(!name||!pts)return;

  const key=db.ref().child('x').push().key;
  db.ref('users/'+uid+'/missions/'+key).set({
    name:name,
    pts:pts,
    lastDone:""
  });

  mName.value="";
  mPoints.value="";
  closeModals();
}

/* ================= DADOS ================= */
function loadUserData(){
  db.ref('users/'+uid).on('value',snap=>{
    const d=snap.val()||{};
    missions=d.missions||{};
    pontos=d.pontos||0;
    renderTrail();
  });
}

/* ================= RENDER ================= */
function renderTrail(){
  trail.innerHTML="";
  let index=0;

  Object.keys(missions).forEach(id=>{
    const m=missions[id];
    if(m.lastDone===today())return;

    const div=document.createElement('div');
    div.className='mission';
    div.innerHTML=`<div class="missionBox">${m.name}</div>`;
    div.onclick=()=>{
      m.lastDone=today();
      pontos+=m.pts;
      db.ref('users/'+uid).update({pontos});
      db.ref('users/'+uid+'/missions/'+id)
        .update({lastDone:m.lastDone});
    };
    trail.appendChild(div);
    index++;
  });

  player.style.top=(200+index*120)+"px";
  levelBox.innerText="Nível "+(Math.floor(pontos/1000)+1);
}
</script>

</body>
  </html>
