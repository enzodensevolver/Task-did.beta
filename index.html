<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Rotina</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>
</head>

<body style="margin:0;font-family:Arial;
background:linear-gradient(135deg,#38bdf8,#22c55e);
min-height:100vh;display:flex;align-items:center;justify-content:center;">

<div id="app" style="background:#fff;padding:25px;border-radius:15px;
width:100%;max-width:360px;text-align:center">

<h2 id="title">🌟 Bem-vindo</h2>

<div>
<button onclick="setLang('pt')">🇧🇷</button>
<button onclick="setLang('en')">🇺🇸</button>
<button onclick="setLang('es')">🇪🇸</button>
</div>

<input id="name" placeholder="Nome" style="width:100%;margin:8px 0">
<input id="email" placeholder="Email" style="width:100%;margin:8px 0">
<input id="password" type="password" placeholder="Senha" style="width:100%;margin:8px 0">

<button onclick="register()" id="btnRegister">Criar conta</button>
<button onclick="login()" id="btnLogin">Entrar</button>

<p id="msg" style="color:red"></p>
</div>

<script>
const t={
pt:{title:"🌟 Bem-vindo",name:"Nome",password:"Senha",register:"Criar conta",login:"Entrar"},
en:{title:"🌟 Welcome",name:"Name",password:"Password",register:"Create account",login:"Login"},
es:{title:"🌟 Bienvenido",name:"Nombre",password:"Contraseña",register:"Crear cuenta",login:"Entrar"}
};

function setLang(l){
title.innerText=t[l].title;
name.placeholder=t[l].name;
password.placeholder=t[l].password;
btnRegister.innerText=t[l].register;
btnLogin.innerText=t[l].login;
}

function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(c=>{
db.collection("users").doc(c.user.uid).set({
name:name.value,xp:0,level:1
});
location.href="dashboard.html";
}).catch(e=>msg.innerText=e.message);
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>location.href="dashboard.html")
.catch(e=>msg.innerText=e.message);
}
</script>
</body>
</html>
