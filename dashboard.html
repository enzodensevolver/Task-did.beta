<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body{margin:0;font-family:Arial;background:#22c55e;height:100vh;display:flex;justify-content:center;align-items:center}
#box{background:#fff;padding:25px;border-radius:15px;width:360px}
</style>
</head>

<body>
<div id="box">
<h2>🎮 Progresso</h2>
<p id="lvl"></p>
<p id="xp"></p>

<label><input type="checkbox" id="treinar"> Treinar</label><br>
<label><input type="checkbox" id="ler"> Ler</label><br>
<label><input type="checkbox" id="estudar"> Estudar</label><br><br>

<button onclick="logout()">Sair</button>
</div>

<script>
let ref,xp=0,level=1;

auth.onAuthStateChanged(u=>{
if(!u){location="index.html";return;}
ref=db.collection("users").doc(u.uid);
ref.get().then(d=>{
let data=d.data();
xp=data.xp; level=data.level;
lvl.innerText="⭐ Nível: "+level;
xpEl();
if(data.challenges){
treinar.checked=data.challenges.treinar||false;
ler.checked=data.challenges.ler||false;
estudar.checked=data.challenges.estudar||false;
}
});
});

function xpEl(){xp.innerText="⚡ XP: "+xp;}

function save(task,val){
if(val){xp+=10;if(xp>=50){xp-=50;level++;}}
lvl.innerText="⭐ Nível: "+level; xpEl();
ref.update({xp,level,[`challenges.${task}`]:val});
}

treinar.onchange=()=>save("treinar",treinar.checked);
ler.onchange=()=>save("ler",ler.checked);
estudar.onchange=()=>save("estudar",estudar.checked);

function logout(){auth.signOut().then(()=>location="index.html");}
</script>
</body>
</html>
