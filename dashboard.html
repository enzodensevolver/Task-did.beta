<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBWrUi9DNZ5jmcXUmjSuKBTLiJGCyau_Pk",
  authDomain: "sua-rotina-em-um-site.firebaseapp.com",
  projectId: "sua-rotina-em-um-site",
  storageBucket: "sua-rotina-em-um-site.firebasestorage.app",
  messagingSenderId: "774359583618",
  appId: "1:774359583618:web:3ccf1600d1ab1dc6eadd9b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#6366f1,#22c55e);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  background:white;
  padding:25px;
  border-radius:15px;
  width:100%;
  max-width:500px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  text-align:center;
}
h2{margin-bottom:15px;}
.reward{font-size:18px;margin:8px 0;}
button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.task{
  background:#f0f0f0;
  margin:5px 0;
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.task button{width:auto;padding:5px 10px;font-size:14px;}
</style>
</head>

<body>
<div class="card">
  <h2 id="title"></h2>

  <div class="reward" id="levelReward"></div>
  <div class="reward" id="xpReward"></div>

  <div id="tasks"></div>

  <button onclick="logout()" style="background:#ef4444;color:white;margin-top:15px;">🚪 Sair</button>
</div>

<script>
// Textos por idioma
const texts = {
  pt:{title:"🎯 Meu Progresso",level:"Nível",xp:"XP",complete:"Concluído! +XP"},
  en:{title:"🎯 My Progress",level:"Level",xp:"XP",complete:"Completed! +XP"},
  es:{title:"🎯 Mi Progreso",level:"Nivel",xp:"XP",complete:"¡Completado! +XP"}
};

let userId, userData, currentLang="pt";
const taskList = document.getElementById("tasks");
const levelReward = document.getElementById("levelReward");
const xpReward = document.getElementById("xpReward");

let globalTasks = []; // desafios do admin

// Verifica login
auth.onAuthStateChanged(user=>{
  if(!user){window.location="index.html";return;}
  userId = user.uid;
  loadUserData();
  loadGlobalTasks();
});

// Carrega dados do usuário
function loadUserData(){
  db.collection("users").doc(userId).get().then(doc=>{
    userData = doc.data();
    currentLang = userData.lang || "pt"; // idioma automático
    updateUI();
  });
}

// Carrega desafios globais do admin
function loadGlobalTasks(){
  db.collection("globalTasks").onSnapshot(snap=>{
    globalTasks = [];
    snap.forEach(doc=>{
      const t = doc.data();
      t.id = doc.id;
      globalTasks.push(t);
    });
    updateUI();
  });
}

// Atualiza UI
function updateUI(){
  const t = texts[currentLang];
  document.getElementById("title").innerText = t.title;
  levelReward.innerText = `${t.level}: ${userData.level}`;
  xpReward.innerText = `${t.xp}: ${userData.xp}`;

  taskList.innerHTML="";

  // Tarefas do usuário
  if(userData.tasks && userData.tasks.length>0){
    userData.tasks.forEach((task,i)=>{
      const div = document.createElement("div");
      div.className="task";
      div.innerHTML=`<span>${task.name} (XP:${task.xp})</span>
        <button onclick="completeUserTask(${i})">✅</button>`;
      taskList.appendChild(div);
    });
  }

  // Desafios globais do admin
  if(globalTasks.length>0){
    globalTasks.forEach((task)=>{
      const div = document.createElement("div");
      div.className="task";
      div.innerHTML=`<span>${task.name} (XP:${task.xp})</span>
        <button onclick="completeGlobalTask('${task.id}',${task.xp})">✅</button>`;
      taskList.appendChild(div);
    });
  }

  if((!userData.tasks || userData.tasks.length===0) && globalTasks.length===0){
    taskList.innerHTML="<p>Nenhuma tarefa disponível.</p>";
  }
}

// Completa tarefa pessoal
function completeUserTask(index){
  const task = userData.tasks[index];
  userData.xp += task.xp;
  if(userData.xp >=100){ userData.xp -=100; userData.level++; }
  userData.tasks.splice(index,1);
  db.collection("users").doc(userId).update({xp:userData.xp,level:userData.level,tasks:userData.tasks});
  alert(`${texts[currentLang].complete} +${task.xp} XP`);
  updateUI();
}

// Completa desafio global
function completeGlobalTask(taskId,xp){
  userData.xp += xp;
  if(userData.xp >=100){ userData.xp -=100; userData.level++; }
  db.collection("users").doc(userId).update({xp:userData.xp,level:userData.level});
  alert(`${texts[currentLang].complete} +${xp} XP`);
  updateUI();
}

// Logout
function logout(){ auth.signOut().then(()=>window.location="index.html"); }
</script>
</body>
</html>
